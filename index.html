<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clio Tec Academy ERP V5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#072D5C;
  --blue2:#123C75;
  --orange:#F7941D;
  --bg:#F4F7FB;
  --text:#142033;
  --muted:#6B7280;
  --line:#E5EAF2;
  --green:#16A34A;
  --red:#DC2626;
  --yellow:#D97706;
  --shadow:0 1px 3px rgba(7,45,92,.07);
  --radius:12px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

button,input,select,textarea{
  font:inherit;
}

button{
  cursor:pointer;
}

.login{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.08fr .92fr;
  background:
    radial-gradient(circle at 15% 20%,rgba(247,148,29,.22),transparent 28%),
    radial-gradient(circle at 80% 5%,rgba(18,60,117,.25),transparent 32%),
    linear-gradient(135deg,#072D5C,#123C75 54%,#F4F7FB 54%);
}

.loginHero{
  color:white;
  padding:64px;
  display:grid;
  place-items:center;
  text-align:center;
}

.loginMainLogo{
  width:230px;
  height:230px;
  object-fit:contain;
  margin-bottom:24px;
  filter:drop-shadow(0 18px 34px rgba(0,0,0,.22));
}

.loginSystemName{
  font-size:50px;
  line-height:1;
  margin:0;
  letter-spacing:-.05em;
  color:white;
}

.loginBoxWrap{
  display:grid;
  place-items:center;
  padding:30px;
}

.loginBox{
  width:min(430px,100%);
  background:white;
  border-radius:28px;
  padding:34px;
  box-shadow:0 30px 90px rgba(7,45,92,.20);
}

.loginBoxBrand{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
}

.loginBoxLogo{
  width:52px;
  height:52px;
  object-fit:contain;
  border-radius:14px;
  background:#F8FAFC;
  border:1px solid var(--line);
  padding:4px;
}

.loginBoxBrand h2{
  margin:0;
  font-size:26px;
  letter-spacing:-.04em;
}

.loginBoxBrand p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

.field{
  display:grid;
  gap:8px;
  margin-bottom:16px;
}

.field label{
  font-size:13px;
  color:#334155;
  font-weight:700;
}

.field input,
.field select,
.field textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px 14px;
  outline:none;
  background:white;
}

.btn{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  background:var(--blue);
  color:white;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn.secondary{
  background:white;
  color:var(--blue);
  border:1px solid var(--line);
}

.btn.orange{
  background:var(--orange);
  color:#301900;
}

.btn.success{
  background:#DCFCE7;
  color:#166534;
}

.btn.danger{
  background:#FEE2E2;
  color:#991B1B;
}

.btn.sm{
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
}

.app{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:100vh;
}

.sidebar{
  background:linear-gradient(180deg,var(--blue),#061F3F);
  color:white;
  padding:24px 18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:900;
  letter-spacing:-.04em;
}

.logo{
  width:44px;
  height:44px;
  border-radius:14px;
  background:white;
  display:grid;
  place-items:center;
  overflow:hidden;
  padding:4px;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.role{
  display:inline-flex;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  color:rgba(255,255,255,.82);
  font-size:12px;
  font-weight:700;
  margin:20px 0;
}

.navTitle{
  color:rgba(255,255,255,.46);
  font-size:11px;
  letter-spacing:.12em;
  font-weight:900;
  margin:18px 10px 8px;
}

.navBtn{
  width:100%;
  border:0;
  background:transparent;
  color:rgba(255,255,255,.82);
  padding:12px;
  border-radius:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
  font-weight:700;
}

.navBtn:hover,
.navBtn.active{
  background:rgba(255,255,255,.12);
  color:white;
}

.topbar{
  min-height:78px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 32px;
  border-bottom:1px solid var(--line);
  background:rgba(244,247,251,.88);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:10;
}

.topbar h1{
  margin:0;
  font-size:26px;
  letter-spacing:-.04em;
}

.topbar p{
  margin:7px 0 0;
  color:var(--muted);
  font-size:13px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--orange),#FFD18C);
  color:var(--blue);
  display:grid;
  place-items:center;
  font-weight:900;
}

.sys-bdg{
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:36px;
  padding:0 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:white;
  color:var(--blue);
  font-size:12px;
  font-weight:800;
}

.sys-bdg i{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--yellow);
}

.sys-bdg.cloud-ok i{background:var(--green)}
.sys-bdg.cloud-error i{background:var(--red)}
.sys-bdg.cloud-syncing i{background:var(--yellow)}

.content{
  padding:28px 32px 40px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:18px;
  margin-bottom:22px;
}

.card{
  background:white;
  border:1px solid rgba(226,232,240,.9);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
}

.kpiLabel{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

.kpiValue{
  font-size:32px;
  font-weight:900;
  letter-spacing:-.05em;
  margin:10px 0 3px;
  color:var(--blue);
}

.kpiSub{
  font-size:12px;
  color:var(--muted);
}

.grid2{
  display:grid;
  grid-template-columns:1.5fr .9fr;
  gap:20px;
}

.grid3{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:18px;
}

.head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.head h2{
  margin:0;
  font-size:18px;
  letter-spacing:-.03em;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.search{
  min-width:260px;
  flex:1;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  background:white;
}

.chip{
  border:1px solid var(--line);
  background:white;
  color:#334155;
  padding:9px 12px;
  border-radius:999px;
  font-weight:800;
  font-size:12px;
}

.chip.active{
  background:#EAF2FF;
  color:var(--blue);
  border-color:#C7DBFF;
}

.tableWrap{
  overflow:auto;
  border-radius:16px;
  border:1px solid var(--line);
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:14px;
  text-align:left;
  border-bottom:1px solid var(--line);
  font-size:13px;
  white-space:nowrap;
}

th{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  background:#F8FAFC;
}

.badge{
  display:inline-flex;
  border-radius:999px;
  padding:6px 9px;
  font-size:12px;
  font-weight:900;
}

.ok{background:#DCFCE7;color:#166534}
.bad{background:#FEE2E2;color:#991B1B}
.warn{background:#FEF3C7;color:#92400E}
.info{background:#DBEAFE;color:#1E40AF}
.gray{background:#F1F5F9;color:#475569}

.progress{
  width:130px;
  height:9px;
  border-radius:999px;
  background:#E5E7EB;
  overflow:hidden;
}

.progress div{
  height:100%;
  border-radius:999px;
  background:var(--green);
}

.progress.warn div{background:var(--yellow)}
.progress.bad div{background:var(--red)}

.list{
  display:grid;
  gap:10px;
}

.listItem{
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  background:white;
  display:flex;
  justify-content:space-between;
  gap:14px;
}

.muted{
  color:var(--muted);
}

.clickableCard{
  cursor:pointer;
  transition:.18s ease;
  position:relative;
}

.clickableCard:hover{
  box-shadow:0 2px 8px rgba(7,45,92,.10);
  border-color:rgba(7,45,92,.22);
}

.clickableCard:after{
  content:"Ver detalle";
  position:absolute;
  right:16px;
  top:16px;
  font-size:11px;
  font-weight:900;
  color:var(--orange);
  opacity:0;
  transition:.18s ease;
}

.clickableCard:hover:after{
  opacity:1;
}

.dashboardLink{
  cursor:pointer;
  transition:.18s ease;
}

.dashboardLink:hover{
  border-color:rgba(7,45,92,.25);
  background:#FAFCFF;
}

.detailMiniGrid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
  margin-bottom:18px;
}

.detailMini{
  background:#F8FAFC;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}

.detailMini b{
  color:var(--blue);
  font-size:22px;
  display:block;
  margin-top:4px;
}

.modalBg{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.45);
  display:grid;
  place-items:center;
  z-index:50;
  padding:20px;
}

.modal{
  width:min(880px,100%);
  max-height:90vh;
  overflow:auto;
  background:white;
  border-radius:24px;
  padding:24px;
  box-shadow:0 40px 120px rgba(0,0,0,.28);
}

.modalHead{
  display:flex;
  justify-content:space-between;
  margin-bottom:18px;
}

.formGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.toast{
  position:fixed;
  right:24px;
  bottom:24px;
  background:var(--blue);
  color:white;
  padding:14px 18px;
  border-radius:14px;
  z-index:60;
  font-weight:800;
}

.empty{
  border:1px dashed #CBD5E1;
  border-radius:16px;
  padding:28px;
  text-align:center;
  color:var(--muted);
  background:#FAFCFF;
}

@media(max-width:1100px){
  .login,
  .app,
  .kpis,
  .grid2,
  .grid3,
  .formGrid,
  .detailMiniGrid{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:relative;
    height:auto;
  }

  .topbar{
    position:relative;
    flex-direction:column;
    align-items:flex-start;
  }

  .content{
    padding:18px;
  }

  .loginHero{
    padding:34px;
  }

  .loginSystemName{
    font-size:34px;
  }

  .loginMainLogo{
    width:170px;
    height:170px;
  }
}
</style>
</head>

function uid(prefix){
  return prefix + Math.random().toString(36).slice(2,9);
}

function currentRoleFromUser(user){
  const username = String(
    user?.usuario ||
    user?.username ||
    user?.user ||
    user?.email ||
    ""
  ).toLowerCase();

  const rawRole = String(
    user?.rol ||
    user?.role ||
    user?.tipo ||
    user?.tipoUsuario ||
    user?.perfil ||
    user?.nivel ||
    ""
  ).toLowerCase();

  if(username === "austudio") return "superadmin";
  if(username === "admin") return "admin";
  if(username === "ventas") return "ventas";
  if(username === "roberto") return "docente";

  if(rawRole.includes("super") || rawRole.includes("soporte")) return "superadmin";
  if(rawRole.includes("admin")) return "admin";
  if(rawRole.includes("venta") || rawRole.includes("promotor")) return "ventas";
  if(rawRole.includes("docente") || rawRole.includes("maestro") || rawRole.includes("profesor")) return "docente";

  return "admin";
}

function normalizeUser(user){
  const username = String(
    user?.usuario ||
    user?.username ||
    user?.user ||
    user?.email ||
    ""
  ).toLowerCase();

  const safePass =
    user?.pass ||
    user?.password ||
    user?.contrasena ||
    user?.contraseña ||
    DEMO_CREDENTIALS[username] ||
    "";

  return {
    ...user,
    id:user?.id || username || uid("u"),
    nombre:user?.nombre || user?.name || user?.displayName || username || "Usuario",
    usuario:username,
    pass:safePass,
    rol:currentRoleFromUser(user),
    activo:user?.activo !== false
  };
}

function normalizeState(raw){
  const base = structuredClone(DEFAULT);
  const next = {...base, ...(raw || {})};

  Object.keys(base).forEach(key=>{
    if(Array.isArray(base[key])){
      if(!Array.isArray(next[key])) next[key] = base[key];
    } else if(typeof base[key]==="object" && base[key]!==null){
      if(typeof next[key]!=="object" || next[key]===null) next[key] = base[key];
    }
  });

  next.users = next.users.map(normalizeUser);

  if(!next.users.some(u=>u.usuario === "austudio")){
    next.users.unshift(normalizeUser(DEFAULT.users[0]));
  }

  return next;
}

function load(){
  const raw = localStorage.getItem(KEY);

  if(!raw){
    localStorage.setItem(KEY,JSON.stringify(DEFAULT));
    return structuredClone(DEFAULT);
  }

  try{
    return JSON.parse(raw);
  }catch(e){
    return structuredClone(DEFAULT);
  }
}

function filteredAlumnos(){
  let data = [...(state.alumnos || [])];
  const role = currentRole();

  if(role === "ventas"){
    data = data.filter(a=>a.promotorId === session.promotorId || session.usuario === "ventas");
  }

  if(role === "docente"){
    const grupos = (state.grupos || [])
      .filter(g=>g.docenteId === session.docenteId || session.usuario === "roberto")
      .map(g=>g.id);

    data = data.filter(a=>grupos.includes(a.grupoId));
  }

  return data;
}

function filteredProspectos(){
  let data = [...(state.prospectos || [])];

  if(currentRole() === "ventas"){
    data = data.filter(p=>p.promotorId === session.promotorId || session.usuario === "ventas");

}

function filteredGrupos(){
  let data = [...(state.grupos || [])];

  if(currentRole() === "docente"){
    data = data.filter(g=>g.docenteId === session.docenteId || session.usuario === "roberto");
  }

  return data;
}

function filteredPagos(){
  let data = [...(state.pagos || [])];

  if(currentRole() === "ventas"){
    const ids = filteredAlumnos().map(a=>a.id);
    data = data.filter(p=>ids.includes(p.alumnoId));
  }

  return data;
}

function asistenciaPct(id){
  const rows = (state.asistencias || []).filter(a=>a.alumnoId === id);

  if(!rows.length){
    return 100;
  }

  const points = rows.map(r=>{
    if(r.estado === "Presente") return 1;
    if(r.estado === "Retardo") return .5;
    if(r.estado === "Justificada") return 1;
    return 0;
  });

  return Math.round(points.reduce((a,b)=>a+b,0) / rows.length * 100);
}

function badge(status){
  const s = String(status || "");
  let cls = "gray";

  if(s.includes("Activo") || s.includes("Pagado") || s.includes("Presente") || s.includes("Al corriente")) cls = "ok";
  if(s.includes("Riesgo") || s.includes("Vencido") || s.includes("Falta")) cls = "bad";
  if(s.includes("Pausa") || s.includes("Por vencer") || s.includes("Retardo") || s.includes("Seguimiento")) cls = "warn";
  if(s.includes("Justificada") || s.includes("Nuevo") || s.includes("Por iniciar")) cls = "info";

  return `<span class="badge ${cls}">${s}</span>`;
}

function login(e){
  e.preventDefault();

  const user = document.getElementById("loginUser").value.trim().toLowerCase();
  const pass = document.getElementById("loginPass").value;

  let found = (state.users || []).find(u=>{
    const normalized = normalizeUser(u);

    return normalized.usuario === user && (
      String(normalized.pass) === pass ||
      DEMO_CREDENTIALS[normalized.usuario] === pass
    );
  });

  if(!found){
    found = DEFAULT.users.find(u=>u.usuario.toLowerCase() === user && u.pass === pass);
  }

  if(!found){
    toast("Usuario o contraseña incorrectos",true);
    return;
  }

  session = normalizeUser(found);
  window.session = session;

  view = "dashboard";
  render();

  setTimeout(()=>{
    window.CliotecFirebase?.startRealtime?.();
  },300);
}

  session = null;

    window.CliotecFirebase.stopRealtime();
  }

  render();
}

function go(v){
  view = v;
  filter = "Todos";
  renderView();
}

function setTitle(title,subtitle){
  document.getElementById("title").textContent = title;
  document.getElementById("subtitle").textContent = subtitle;
}

function renderView(){
  const valid = MENU.find(m=>m.id === view && allowed(m));

  if(!valid){
    view = "dashboard";
  }

  const views = {
    dashboard,
    calendario,
    alumnos,
    prospectos,
    grupos,
    asistencia,
    pagos,
    cobranza,
    nomina,
    finanzas,
    reportes,
    usuarios,
    config
  };

  views[view]();
}

function kpi(label,value,sub){
  return `
  <div class="card">
    <div class="kpiLabel">${label}</div>
    <div class="kpiValue">${value}</div>
    <div class="kpiSub">${sub}</div>
  </div>`;
}

function kpiAction(label,value,sub,type){
  return `
  <div class="card clickableCard" onclick="openDashboardDetail('${type}')">
    <div class="kpiLabel">${label}</div>
    <div class="kpiValue">${value}</div>
    <div class="kpiSub">${sub}</div>
  </div>`;
}

function openDashboardDetail(type){
  const alumnos = filteredAlumnos();
  const pagos = filteredPagos();

  if(type === "alumnosActivos"){
    const data = alumnos.filter(a=>a.estado === "Activo");

    openModal("Alumnos activos",`
      <div class="detailMiniGrid">
        <div class="detailMini">Total<b>${data.length}</b></div>
        <div class="detailMini">Al corriente<b>${data.filter(a=>a.financiero === "Al corriente").length}</b></div>
        <div class="detailMini">Promedio asistencia<b>${Math.round(data.reduce((s,a)=>s+asistenciaPct(a.id),0)/(data.length || 1))}%</b></div>
      </div>
      ${tableAlumnos(data)}
    `);
  }

  if(type === "ingresos"){
    const data = pagos.filter(p=>p.estado === "Pagado");
    const total = data.reduce((s,p)=>s+p.monto,0);

    openModal("Ingresos registrados",`
      <div class="detailMiniGrid">
        <div class="detailMini">Total cobrado<b>${money(total)}</b></div>
        <div class="detailMini">Pagos<b>${data.length}</b></div>
        <div class="detailMini">Promedio<b>${money(total / (data.length || 1))}</b></div>
      </div>
      ${tablePagos(data)}
    `);
  }

  if(type === "cobranza"){
    const data = pagos.filter(p=>p.estado === "Vencido");
    const total = data.reduce((s,p)=>s+p.monto,0);

    openModal("Cobranza pendiente",`
      <div class="detailMiniGrid">
        <div class="detailMini">Total vencido<b>${money(total)}</b></div>
        <div class="detailMini">Casos<b>${data.length}</b></div>
        <div class="detailMini">Prioridad<b>Alta</b></div>
      </div>

      <div class="list">
        ${
          data.map(p=>`
          <div class="listItem">
            <div>
              <b>${by("alumnos",p.alumnoId)?.nombre || "-"}</b>
              <div class="muted">${p.concepto} · ${p.fecha}</div>

        }
      </div>
    `);
  }

  if(type === "riesgo"){
    const data = alumnos.filter(a=>a.estado === "Riesgo" || asistenciaPct(a.id) < 70);

    openModal("Riesgo académico",`
      <div class="detailMiniGrid">
        <div class="detailMini">Alumnos en riesgo<b>${data.length}</b></div>
        <div class="detailMini">Baja asistencia<b>${data.filter(a=>asistenciaPct(a.id)<70).length}</b></div>
        <div class="detailMini">Seguimiento<b>Requerido</b></div>
      </div>
      ${tableAlumnos(data)}
    `);
  }

  if(type === "actividad"){
    openModal("Actividad reciente",`
      <div class="list">
        ${
          (state.timeline || []).slice().reverse().map(t=>`
          <div class="listItem dashboardLink" onclick="openTimelineDetail('${t.id}')">
            <div>
              <b>${t.tipo}</b>
              <div class="muted">${t.fecha} · ${t.texto}</div>

            <span class="muted">›</span>
          </div>
          `).join("") || `<div class="empty">Sin actividad reciente.</div>`
        }
      </div>
    `);
  }

function setAsistencia(id,estado,btn){
  tempAttendance[id] = estado;

  btn.parentElement.querySelectorAll("button").forEach(b=>{
    b.classList.remove("orange");
  });

  btn.classList.add("orange");
}

function guardarAsistencia(){
  const grupoId = window.selectedGrupo;
  const grupo = by("grupos",grupoId);
  const fecha = document.getElementById("fechaAsistencia").value;
  const alumnos = filteredAlumnos().filter(a=>a.grupoId === grupoId);

  if(!grupo){
    toast("Selecciona un grupo válido.",true);
    return;
  }

  alumnos.forEach(a=>{
    const estado = tempAttendance[a.id] || "Presente";

    state.asistencias.push({
      id:uid("as"),
      alumnoId:a.id,
      grupoId,
      docenteId:grupo.docenteId,
      fecha,
      estado
    });

    state.timeline.push({
      id:uid("t"),
      alumnoId:a.id,
      fecha,
      tipo:"Asistencia",
      texto:`${estado} registrado en ${grupo.nombre}.`
    });
  });

  save();
  toast("Asistencia guardada");
  asistencia();
}

function nomina(){
  setTitle("Nómina","Docentes, ventas y tabuladores");

  const tab = window._nominaTab || "docentes";
  window._nominaTab = tab;

  const tabs = `
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    <button class="btn ${tab==="docentes"?"orange":"secondary"}" onclick="window._nominaTab='docentes';nomina()">Nómina docentes</button>
    <button class="btn ${tab==="ventas"?"orange":"secondary"}" onclick="window._nominaTab='ventas';nomina()">Nómina ventas</button>
    <button class="btn ${tab==="tabuladores"?"orange":"secondary"}" onclick="window._nominaTab='tabuladores';nomina()">Tabuladores</button>
  </div>`;

  if(tab === "docentes"){
    if(!window._nominaOv) window._nominaOv = {};
    const tabuladores = state.tabuladores || [];

    function calcDetalle(d){
      const misGrupos = (state.grupos||[]).filter(g=>g.docenteId===d.id && g.estado==="Activo");
      let totalMensual = 0;
      const detalle = misGrupos.map(g=>{
        const ov = window._nominaOv[g.id] || {};
        const numAlumnosAuto = (state.alumnos||[]).filter(a=>a.grupoId===g.id && a.estado==="Activo").length;
        const numAlumnos = ov.numAlumnos !== undefined ? Number(ov.numAlumnos) : numAlumnosAuto;
        const horasSemAuto = Number(g.horasSemana)||2;
        const horasSemana = ov.horasSemana !== undefined ? Number(ov.horasSemana) : horasSemAuto;
        const tab2 = tabuladores.find(t=>numAlumnos>=t.minAlumnos && numAlumnos<=t.maxAlumnos);
        const tarifa = tab2?.tarifaHora || Number(d.tarifaHora) || 250;
        const subtotal = tarifa * horasSemana * 4;
        totalMensual += subtotal;
        const modificado = ov.numAlumnos !== undefined || ov.horasSemana !== undefined;
        return {g,numAlumnos,numAlumnosAuto,horasSemana,horasSemAuto,tarifa,subtotal,modificado};
      });
      return {d,misGrupos,totalMensual,detalle};
    }

    const rows = (state.docentes||[]).map(calcDetalle);
    const hayOverrides = Object.keys(window._nominaOv).length > 0;

    document.getElementById("view").innerHTML = `${tabs}
    <div class="card">
      <div class="head">
        <h2>Nómina docentes — ${new Date().toLocaleString("es-MX",{month:"long",year:"numeric"})}</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${hayOverrides ? `<button class="btn secondary sm" onclick="window._nominaOv={};nomina()">Restaurar automático</button>` : ""}
          <button class="btn secondary sm" onclick="window.print()">Imprimir</button>
        </div>
      </div>
      <p class="muted" style="margin-bottom:12px">Los campos de Alumnos y Hrs/sem son editables para ajustes manuales. El cálculo se actualiza al modificarlos.</p>
      ${rows.map(r=>`
        <div style="border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px${r.detalle.some(d=>d.modificado)?' background:#FFFBEB;':''}">
          <div class="head" style="margin-bottom:8px">
            <div>
              <b style="font-size:16px">${esc(r.d.nombre)}</b>
              <div class="muted">${r.misGrupos.length} grupo(s) activo(s) · Tarifa individual: ${money(r.d.tarifaHora)}/hr</div>
            </div>
            <b style="font-size:22px;color:var(--blue)">${money(r.totalMensual)}</b>
          </div>
          ${r.detalle.length ? `
            <div class="tableWrap">
              <table>
                <thead><tr><th>Grupo</th><th>Alumnos</th><th>Hrs/sem</th><th>Tarifa/hr</th><th>Mensual (×4 sem)</th><th></th></tr></thead>
                <tbody>
                  ${r.detalle.map(det=>`
                    <tr${det.modificado?' style="background:#FEF9C3"':''}>
                      <td>${esc(det.g.nombre)}</td>
                      <td>
                        <input type="number" min="0" style="width:64px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;font-size:13px${det.modificado?';border-color:var(--yellow);font-weight:700':''}"
                          value="${det.numAlumnos}" title="Auto: ${det.numAlumnosAuto}"
                          oninput="(window._nominaOv['${det.g.id}']||(window._nominaOv['${det.g.id}']={}))[&#39;numAlumnos&#39;]=this.value;nomina()">
                      </td>
                      <td>
                        <input type="number" min="0" style="width:64px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;font-size:13px${det.modificado?';border-color:var(--yellow);font-weight:700':''}"
                          value="${det.horasSemana}" title="Auto: ${det.horasSemAuto}"
                          oninput="(window._nominaOv['${det.g.id}']||(window._nominaOv['${det.g.id}']={}))[&#39;horasSemana&#39;]=this.value;nomina()">
                      </td>
                      <td>${money(det.tarifa)}</td>
                      <td><b>${money(det.subtotal)}</b></td>
                      <td>${det.modificado?`<button class="btn secondary sm" style="font-size:11px" onclick="delete window._nominaOv['${det.g.id}'];nomina()">↺</button>`:'<span class="muted" style="font-size:11px">Auto</span>'}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>` : `<div class="empty">Sin grupos activos este período.</div>`}
        </div>
      `).join("") || `<div class="empty">Sin docentes registrados.</div>`}
    </div>`;

  } else if(tab === "ventas"){
    const com = state.comisiones || {pctInscripcion:10,pctColegiatura:5};
    const mesActual = new Date().toISOString().slice(0,7);
    const pagosDelMes = (state.pagos||[]).filter(p=>p.fecha&&p.fecha.startsWith(mesActual)&&p.estado==="Pagado");

    const rows = (state.promotores||[]).map(p=>{
      const misAlumnos = (state.alumnos||[]).filter(a=>a.promotorId===p.id);
      const misIds = new Set(misAlumnos.map(a=>a.id));
      const misPagos = pagosDelMes.filter(pg=>misIds.has(pg.alumnoId));
      const insc = misPagos.filter(pg=>(pg.concepto||"").toLowerCase().includes("inscripci")).reduce((s,pg)=>s+pg.monto,0);
      const col  = misPagos.filter(pg=>!(pg.concepto||"").toLowerCase().includes("inscripci")).reduce((s,pg)=>s+pg.monto,0);
      const comision = (insc*(com.pctInscripcion/100)) + (col*(com.pctColegiatura/100));
      return {p,total:misAlumnos.length,insc,col,comision};
    });

    document.getElementById("view").innerHTML = `${tabs}
    <div class="card" style="margin-bottom:16px">
      <div class="head">
        <h2>Comisiones configuradas</h2>
        <button class="btn secondary sm" onclick="editComisiones()">Editar</button>
      </div>
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div><b>Inscripción:</b> ${com.pctInscripcion}%</div>
        <div><b>Colegiatura:</b> ${com.pctColegiatura}%</div>
        <div class="muted">Período: ${mesActual}</div>
      </div>
    </div>
    <div class="card">
      <div class="head"><h2>Nómina equipo de ventas</h2></div>
      <div class="tableWrap">
        <table>
          <thead><tr><th>Promotor</th><th>Alumnos</th><th>Inscripciones cobradas</th><th>Colegiaturas cobradas</th><th>Comisión total</th></tr></thead>
          <tbody>
            ${rows.map(r=>`
              <tr>
                <td><b>${r.p.nombre}</b></td>
                <td>${r.total}</td>
                <td>${money(r.insc)}</td>
                <td>${money(r.col)}</td>
                <td><b style="color:var(--green)">${money(r.comision)}</b></td>
              </tr>
            `).join("") || `<tr><td colspan="5" style="text-align:center;color:var(--muted)">Sin promotores registrados.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;

  } else {
    const tabuladores = state.tabuladores || [];
    document.getElementById("view").innerHTML = `${tabs}
    <div class="card">
      <div class="head">
        <h2>Tabuladores salariales docentes</h2>
        <button class="btn orange" onclick="openTabuladorModal()">+ Nuevo tabulador</button>
      </div>
      <p class="muted">La tarifa aplicada a cada grupo se determina automáticamente según el número de alumnos activos en ese grupo.</p>
      <div class="tableWrap">
        <table>
          <thead><tr><th>Nivel</th><th>Mín. alumnos</th><th>Máx. alumnos</th><th>Tarifa / hr</th><th>Acciones</th></tr></thead>
          <tbody>
            ${tabuladores.map(t=>`
              <tr>
                <td><b>${t.nombre}</b></td>
                <td>${t.minAlumnos}</td>
                <td>${t.maxAlumnos>=999?"Sin límite":t.maxAlumnos}</td>
                <td><b>${money(t.tarifaHora)}</b></td>
                <td>
                  <button class="btn secondary sm" onclick="openTabuladorModal('${t.id}')">Editar</button>
                  <button class="btn danger sm" onclick="deleteTabulador('${t.id}')">Eliminar</button>
                </td>
              </tr>
            `).join("") || `<tr><td colspan="5" style="text-align:center;color:var(--muted)">Sin tabuladores — se usa la tarifa individual de cada docente.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
  }
}

function exportCSV(){
  const rows = filteredAlumnos().map(a=>[
    a.matricula,
    a.nombre,
    by("cursos",a.cursoId)?.nombre,
    by("grupos",a.grupoId)?.nombre,
    a.estado,
    a.financiero,
    asistenciaPct(a.id) + "%"
  ]);

  const csv =
    "Matricula,Nombre,Curso,Grupo,Estado,Finanzas,Asistencia\n" +
    rows.map(r=>r.map(v=>`"${v || ""}"`).join(",")).join("\n");

  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "reporte-alumnos-cliotec-v5.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function saveAlumno(){
  const nombre = val("nombre").trim();
  if(!nombre){ toast("El nombre es requerido",true); return; }

  const alumno = {
    id:uid("a"),
    matricula:"CTA-" + String((state.alumnos || []).length + 1).padStart(4,"0"),
    nombre,
    email:val("email"),
    whatsapp:val("whatsapp"),
    cursoId:val("cursoId"),
    grupoId:val("grupoId"),
    promotorId:currentRole() === "ventas" ? session.promotorId : val("promotorId"),
    estado:"Activo",
    financiero:"Al corriente",
    inscripcion:Number(val("inscripcion"))||0,
    colegiatura:Number(val("colegiatura"))||0,
    notas:val("notas")
  };

  state.alumnos.push(alumno);

  const fechaInsc = val("fechaInscripcion");
  const fechaPrimerPago = val("fechaPrimerPago");

  if(fechaInsc && alumno.inscripcion > 0){
    state.pagos.push({
      id:uid("pg"), alumnoId:alumno.id,
      concepto:"Inscripción", monto:alumno.inscripcion,
      fecha:fechaInsc, estado:"Pagado"
    });
  }

  if(fechaPrimerPago && alumno.colegiatura > 0){
    state.pagos.push({
      id:uid("pg"), alumnoId:alumno.id,
      concepto:"Colegiatura", monto:alumno.colegiatura,
      fecha:fechaPrimerPago, estado:"Por vencer"
    });
  }

  state.timeline.push({
    id:uid("t"),
    alumnoId:alumno.id,
    fecha:new Date().toISOString().slice(0,10),
    tipo:"Inscripción",
    texto:`${alumno.nombre} fue dado de alta.`
  });

  save();
  closeModal();
  toast("Alumno creado" + (fechaInsc||fechaPrimerPago ? " · Pagos programados" : ""));
  alumnos();
}

// Al elegir alumno en el modal de pago: cargar las fechas previstas de su grupo
// y pre-seleccionar la próxima fecha que aún no tenga pago registrado.
function onPagoAlumnoChange(){
  const alumnoId = val("alumnoId");
  const sel = document.getElementById("fechaPrevista");
  if(!sel) return;
  const a = by("alumnos",alumnoId);
  const g = a ? by("grupos",a.grupoId) : null;
  const fechas = fechasPagoGrupo(g);

  if(a && Number(a.colegiatura)){
    const montoEl = document.getElementById("monto");
    if(montoEl) montoEl.value = a.colegiatura;
  }

  if(!fechas.length){
    sel.innerHTML = `<option value="">Este grupo no tiene fechas programadas</option>`;
    return;
  }

  const pagadas = new Set((state.pagos||[]).filter(p=>p.alumnoId===alumnoId).map(p=>p.fecha));
  const proxima = fechas.find(f=>!pagadas.has(f)) || fechas[fechas.length-1];

  sel.innerHTML = fechas.map((f,i)=>{
    const ya = pagadas.has(f) ? " · ya registrada" : "";
    return `<option value="${f}" ${f===proxima?"selected":""}>Pago ${i+1}: ${f}${ya}</option>`;
  }).join("");

  const fechaEl = document.getElementById("fecha");
  if(fechaEl && proxima) fechaEl.value = proxima;
}

function savePago(){
  const alumnoId  = val("alumnoId");
  const concepto  = val("concepto");
  const monto     = Number(val("monto"));
  const fecha     = val("fecha");
  const estado    = val("estado");
  const proximoPago = val("proximoPago");

  if(!alumnoId){ toast("Selecciona un alumno",true); return; }

  state.pagos.push({ id:uid("pg"), alumnoId, concepto, monto, fecha, estado });

  const a = by("alumnos",alumnoId);
  if(a){
    state.timeline.push({
      id:uid("t"), alumnoId, fecha,
      tipo:"Pago",
      texto:`Pago de ${money(monto)} registrado (${concepto}).`
    });
  }

  if(proximoPago){
    state.pagos.push({ id:uid("pg"), alumnoId, concepto, monto, fecha:proximoPago, estado:"Por vencer" });
    toast("Pago registrado · Próximo cargo programado para " + proximoPago);
  } else {
    toast("Pago creado");
  }

  save();
  closeModal();
  pagos();
}

// Fechas de pago de un grupo: 1 pago cada 28 días desde la fecha de inicio.
function fechasPagoGrupo(g){
  if(!g || !g.fechaInicio) return [];
  const semanas = Number(g.semanas)||16;
  const nPagos = Math.max(1, Math.round(semanas/4));
  const out = [];
  const base = new Date(g.fechaInicio + "T00:00:00");
  if(isNaN(base)) return [];
  for(let i=0;i<nPagos;i++){
    const d = new Date(base);
    d.setDate(d.getDate() + 28*i);
    out.push(d.toISOString().slice(0,10));
  }
  return out;
}

function previewFechasGrupo(){
  const cont = document.getElementById("gm_preview");
  if(!cont) return;
  const fechaInicio = document.getElementById("gm_fechaInicio")?.value||"";
  const semanas = Number(document.getElementById("gm_semanas")?.value)||16;
  const fechas = fechasPagoGrupo({fechaInicio,semanas});
  if(!fechas.length){ cont.innerHTML = ""; return; }
  cont.innerHTML = `<b>Fechas previstas (${fechas.length}):</b> ` +
    fechas.map(f=>`<span style="display:inline-block;background:white;border:1px solid var(--line);border-radius:8px;padding:2px 8px;margin:2px">${f}</span>`).join("");
}

function saveGrupo(id){
  const nombre = document.getElementById("gm_nombre")?.value?.trim();
  if(!nombre){ toast("El nombre es requerido",true); return; }
  const data = {
    nombre,
    cursoId    :document.getElementById("gm_cursoId")?.value||"",
    docenteId  :document.getElementById("gm_docenteId")?.value||"",
    horario    :document.getElementById("gm_horario")?.value||"",
    horasSemana:Number(document.getElementById("gm_horasSemana")?.value)||2,
    estado     :document.getElementById("gm_estado")?.value||"Por iniciar",
    fechaInicio:document.getElementById("gm_fechaInicio")?.value||"",
    semanas    :Number(document.getElementById("gm_semanas")?.value)||16
  };
  const generar = document.getElementById("gm_generarPagos")?.checked;

  let grupoFinal;
  if(id){
    const g = (state.grupos||[]).find(x=>x.id===id);
    if(!g){ toast("Grupo no encontrado",true); return; }
    Object.assign(g,data);
    grupoFinal = g;
  } else {
    grupoFinal = {id:uid("g"),...data};
    state.grupos.push(grupoFinal);
  }

  let cargos = 0;
  if(generar){
    cargos = generarCargosGrupo(grupoFinal);
  }

  save(); closeModal();
  toast((id?"Grupo actualizado":"Grupo creado") + (cargos?` · ${cargos} cargos programados`:""));
  grupos();
}

// Genera los cargos de colegiatura programados (cada 28 días) para los alumnos activos del grupo.
// Evita duplicar cargos que ya existan en las mismas fechas.
function generarCargosGrupo(g){
  const fechas = fechasPagoGrupo(g);
  if(!fechas.length) return 0;
  const alumnos = (state.alumnos||[]).filter(a=>a.grupoId===g.id && a.estado==="Activo");
  const hoy = new Date().toISOString().slice(0,10);
  let creados = 0;
  alumnos.forEach(a=>{
    const monto = Number(a.colegiatura)||699;
    fechas.forEach((f,i)=>{
      const yaExiste = (state.pagos||[]).some(p=>p.alumnoId===a.id && p.fecha===f && (p.concepto||"").toLowerCase().includes("colegiatura"));
      if(yaExiste) return;
      state.pagos.push({
        id:uid("pg"), alumnoId:a.id,
        concepto:`Colegiatura (pago ${i+1})`,
        monto, fecha:f,
        estado: f < hoy ? "Vencido" : "Por vencer"
      });
      creados++;
    });
  });

}

// ─── Calendario ─────────────────────────────────────────────────────────────
function calendario(){
  setTitle("Calendario","Pagos y eventos del mes");

  const hoy = new Date();
  const mesBase = window._calMes !== undefined ? window._calMes : hoy.getMonth();
  const anoBase = window._calAno !== undefined ? window._calAno : hoy.getFullYear();
  window._calMes = mesBase;
  window._calAno = anoBase;

  const primerDia   = new Date(anoBase,mesBase,1);
  const diasEnMes   = new Date(anoBase,mesBase+1,0).getDate();
  const inicioSem   = primerDia.getDay();
  const mesStr      = String(mesBase+1).padStart(2,"0");
  const prefijo     = `${anoBase}-${mesStr}`;
  const pagosMes    = (state.pagos||[]).filter(p=>p.fecha&&p.fecha.startsWith(prefijo));
  const mesesNombres= ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const eventos = {};
  pagosMes.forEach(p=>{
    const d = parseInt(p.fecha.split("-")[2]);
    if(!eventos[d]) eventos[d]=[];
    eventos[d].push({texto:by("alumnos",p.alumnoId)?.nombre||"-",estado:p.estado,monto:p.monto});
  });

  // Eventos propios (agregados por el usuario)
  const customEv = {};
  (state.eventos||[]).filter(e=>e.fecha&&e.fecha.startsWith(prefijo)).forEach(e=>{
    const d = parseInt(e.fecha.split("-")[2]);
    if(!customEv[d]) customEv[d]=[];
    customEv[d].push(e);
  });

  let celdas = "";
  for(let i=0;i<inicioSem;i++) celdas+=`<div style="min-height:76px;border:1px solid var(--line);border-radius:8px;background:#F8FAFC"></div>`;

  for(let d=1;d<=diasEnMes;d++){
    const isHoy = d===hoy.getDate()&&mesBase===hoy.getMonth()&&anoBase===hoy.getFullYear();
    const evs   = eventos[d]||[];
    const cev   = customEv[d]||[];
    const dot   = evs.some(e=>e.estado==="Vencido")?"var(--red)":evs.some(e=>e.estado==="Por vencer")?"var(--yellow)":evs.length?"var(--green)":"transparent";
    celdas += `
    <div style="min-height:76px;border:1px solid ${isHoy?"var(--blue)":"var(--line)"};border-radius:8px;padding:6px;background:${isHoy?"#EAF2FF":"white"};cursor:pointer"
      onclick="openCalDia(${d},${mesBase},${anoBase})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:${isHoy?"900":"600"};font-size:13px;color:${isHoy?"var(--blue)":"inherit"}">${d}</span>
        <span style="display:flex;gap:3px;align-items:center">
          ${cev.length?`<span style="width:8px;height:8px;border-radius:2px;background:var(--blue);display:inline-block"></span>`:""}
          ${evs.length?`<span style="width:8px;height:8px;border-radius:50%;background:${dot};display:inline-block"></span>`:""}
        </span>
      </div>
      ${cev.slice(0,1).map(e=>`<div style="font-size:10px;color:var(--blue);font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px">📌 ${esc(e.titulo||"")}</div>`).join("")}
      ${evs.slice(0,2).map(e=>`<div style="font-size:10px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px">${esc(e.texto)}</div>`).join("")}
      ${(evs.length+cev.length)>3?`<div style="font-size:10px;color:var(--blue)">+${evs.length+cev.length-3} más</div>`:""}
    </div>`;
  }

  document.getElementById("view").innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn secondary sm" onclick="window._calMes=${mesBase===0?11:(mesBase-1)};window._calAno=${mesBase===0?(anoBase-1):anoBase};calendario()">‹ Anterior</button>
      <h2 style="margin:0">${mesesNombres[mesBase]} ${anoBase}</h2>
      <button class="btn secondary sm" onclick="window._calMes=${mesBase===11?0:(mesBase+1)};window._calAno=${mesBase===11?(anoBase+1):anoBase};calendario()">Siguiente ›</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;font-size:12px;flex-wrap:wrap">
      <button class="btn orange sm" onclick="openEventoModal()">+ Agregar evento</button>
      <span style="width:8px;height:8px;border-radius:2px;background:var(--blue);display:inline-block"></span>Evento
      <span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px"></span>Pagado
      <span style="width:8px;height:8px;border-radius:50%;background:var(--yellow);display:inline-block;margin-left:6px"></span>Por vencer
      <span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-left:6px"></span>Vencido
    </div>
  </div>
  <div class="card">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">
      ${["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].map(d=>`<div style="text-align:center;font-size:11px;font-weight:900;color:var(--muted);padding:4px">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${celdas}</div>
  </div>`;
}

function openCalDia(d,mes,ano){

  const pagosDia = (state.pagos||[]).filter(p=>p.fecha===fecha);

          <div class="listItem">

<script type="module" id="cliotec-firebase-v5-adapter">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  doc,
  setDoc,
  deleteDoc,
  getDocs,
  onSnapshot,
  writeBatch,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CLIOTEC_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBw5dSCh1OSk7PNnhFkbLGDKPNcXj51X-8",
  authDomain: "cliotec-admin-test.firebaseapp.com",
  projectId: "cliotec-admin-test",

  messagingSenderId: "181571532651",
  appId: "1:181571532651:web:efa62fdbebc37a25ec7e2e"
};

const COLLECTION_MAP = {
  users:"usuarios",
  promotores:"promotores",
  docentes:"docentes",
  cursos:"cursos",
  grupos:"grupos",
  alumnos:"alumnos",
  prospectos:"prospectos",
  pagos:"pagos",
  asistencias:"asistencias",
  timeline:"timeline",
  tabuladores:"tabuladores",
  eventos:"eventos"
};

const ALL_FIREBASE_COLLECTIONS = [
  ...Object.values(COLLECTION_MAP),
  "config",
  "sync_logs"
];

window.__cliotecRealtimeUnsubs = window.__cliotecRealtimeUnsubs || [];
window.__cliotecFirebaseStarted = false;
window.__cliotecApplyingRemote = false;

let publishTimer = null;

function getLocalState(){
  try{
    if(window.state){
      return window.state;
    }

    const raw = localStorage.getItem(window.APP_KEY || "cliotec_erp_v5_firebase");

    if(raw){
      return JSON.parse(raw);
    }

    return {};
  }catch(error){
    console.error("No se pudo leer el estado local:", error);
    return {};
  }
}

function saveLocalState(nextState){
  try{
    if(typeof window.applyRemoteState === "function"){
      window.applyRemoteState(nextState);
      return;
    }

    window.state = nextState;

    localStorage.setItem(
      window.APP_KEY || "cliotec_erp_v5_firebase",
      JSON.stringify(nextState)
    );

    if(typeof window.renderView === "function" && window.session){
      window.renderView();
    }
  }catch(error){
    console.error("No se pudo guardar estado local:", error);
  }
}

function setCloudBadge(text, mode = "cloud"){
  const badge =
    document.getElementById("cloudBadge") ||
    document.querySelector(".sys-bdg");

  if(badge){
    badge.innerHTML = `<i></i><span>${text}</span>`;

    badge.classList.remove(
      "cloud-ok",
      "cloud-error",
      "cloud-syncing"
    );

    badge.classList.add(
      mode === "error"
        ? "cloud-error"
        : mode === "syncing"
        ? "cloud-syncing"
        : "cloud-ok"
    );
  }
}

function normalizeDoc(firebaseDoc){
  const data = firebaseDoc.data();

  return {
    id:data.id ?? firebaseDoc.id,
    ...data
  };
}

function normalizeRemoteRows(stateKey, rows){
  if(stateKey === "users" && typeof window.normalizeUser === "function"){
    return rows.map(window.normalizeUser);
  }

  return rows;
}

function stopRealtime(){
  (window.__cliotecRealtimeUnsubs || []).forEach(unsubscribe=>{
    try{
      unsubscribe();
    }catch(error){
      console.warn("No se pudo detener listener:", error);
    }
  });

  window.__cliotecRealtimeUnsubs = [];
  window.__cliotecFirebaseStarted = false;
}

// Bandera de "siembra": mientras la base local nueva no se haya subido a la nube,
// el realtime NO debe sobreescribirla con datos viejos de Firebase.
const SEED_KEY = "cliotec_seeded_2026_07";
function isSeeded(){
  try{ return localStorage.getItem(SEED_KEY) === "1"; }catch(e){ return false; }
}
function markSeeded(){
  try{ localStorage.setItem(SEED_KEY,"1"); }catch(e){}
}
window.isSeeded = isSeeded;
window.markSeeded = markSeeded;

function startRealtime(){
  const db = window._cliotecDb;

  if(!db){
    console.warn("Firebase todavía no está inicializado.");
    return;
  }

  if(window.__cliotecFirebaseStarted){
    return;
  }

  window.__cliotecFirebaseStarted = true;

  setCloudBadge(isSeeded() ? "Firebase realtime" : "Base nueva local · pendiente subir","cloud");

  Object.entries(COLLECTION_MAP).forEach(([stateKey,collectionName])=>{
    const unsubscribe = onSnapshot(
      collection(db,collectionName),
      snapshot=>{
        if(window.__cliotecApplyingRemote){
          return;
        }

        // Protección: no dejar que la nube vieja borre la base local nueva
        // hasta que se haya hecho el reemplazo/siembra desde este equipo.
        if(!isSeeded()){
          return;
        }

        if(snapshot.empty){
          return;
        }

        const currentState = getLocalState();
        const remoteRows = normalizeRemoteRows(
          stateKey,
          snapshot.docs.map(normalizeDoc)
        );

        const nextState = {
          ...currentState,
          [stateKey]:remoteRows
        };

        window.__cliotecApplyingRemote = true;
        saveLocalState(nextState);
        window.__cliotecApplyingRemote = false;
      },
      error=>{
        console.error(`Error escuchando ${collectionName}:`, error);
        setCloudBadge("Error Firebase","error");

        if(typeof window.toast === "function"){
          window.toast("Error de sincronización Firebase.",true);
        }
      }
    );

    window.__cliotecRealtimeUnsubs.push(unsubscribe);
  });

  // Escuchar comisiones (doc único en colección "config")
  const unsubComisiones = onSnapshot(
    doc(db,"config","comisiones"),
    snap=>{
      if(window.__cliotecApplyingRemote || !snap.exists()) return;
      if(!isSeeded()) return;
      const data = snap.data();
      const currentState = getLocalState();
      const nextState = {
        ...currentState,
        comisiones:{
          pctInscripcion: Number(data.pctInscripcion) || 10,
          pctColegiatura: Number(data.pctColegiatura) || 5
        }
      };
      window.__cliotecApplyingRemote = true;
      saveLocalState(nextState);
      window.__cliotecApplyingRemote = false;
    },
    error=>{ console.warn("Error escuchando config/comisiones:", error); }
  );
  window.__cliotecRealtimeUnsubs.push(unsubComisiones);
}

async function uploadCurrentStateToFirebase(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  const currentState = getLocalState();

  setCloudBadge("Subiendo Firebase","syncing");

  stopRealtime();

  let total = 0;

  for(const [stateKey,collectionName] of Object.entries(COLLECTION_MAP)){
    const rows = Array.isArray(currentState[stateKey])
      ? currentState[stateKey]
      : [];

    if(!rows.length){
      continue;
    }

    const batch = writeBatch(db);

    rows.forEach((row,index)=>{
      const safeId = String(
        row.id ||
        row.usuario ||
        row.matricula ||
        `${stateKey}_${index}_${Date.now()}`
      );

      batch.set(doc(db,collectionName,safeId),{
        ...row,
        id:row.id || safeId,
        updatedAt:serverTimestamp()
      },{merge:true});

      total++;
    });

    await batch.commit();
  }

  // Sync comisiones como documento único en config/comisiones
  const com = currentState.comisiones || {pctInscripcion:10,pctColegiatura:5};
  await setDoc(doc(db,"config","comisiones"),{
    ...com,
    id:"comisiones",
    updatedAt:serverTimestamp()
  },{merge:true});
  total++;

  await setDoc(doc(db,"sync_logs","last_manual_upload"),{
    tipo:"manual_upload",
    total,
    fecha:new Date().toISOString(),
    updatedAt:serverTimestamp()
  },{merge:true});

  // Una vez subida la base local, la nube ya refleja lo local: el realtime puede sincronizar.
  markSeeded();
  setCloudBadge("Firebase realtime","cloud");

  if(typeof window.toast === "function"){
    window.toast(`Base subida a Firebase: ${total} registros.`);
  }

  startRealtime();

  return total;
}

function publishDebounced(){
  clearTimeout(publishTimer);

  publishTimer = setTimeout(()=>{
    uploadCurrentStateToFirebase().catch(error=>{
      console.warn("No se autopublicó en Firebase:", error.message);
    });
  },1400);
}

async function clearCollection(db,collectionName){
  let total = 0;

  while(true){
    const snapshot = await getDocs(collection(db,collectionName));

    if(snapshot.empty){
      break;
    }

    const docs = snapshot.docs.slice(0,400);
    const batch = writeBatch(db);

    docs.forEach(item=>{
      batch.delete(doc(db,collectionName,item.id));
    });

    await batch.commit();

    total += docs.length;

    if(snapshot.size <= 400){
      break;
    }
  }

  return total;
}

async function clearFirebaseDatabase(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  const username = String(window.session?.usuario || "").toLowerCase();

  if(username !== "austudio"){
    alert("Solo austudio puede limpiar Firebase.");
    return 0;
  }

  const code = prompt(
    "Esta acción eliminará la base Firestore de prueba. Escribe LIMPIAR para confirmar:"
  );

  if(code !== "LIMPIAR"){
    return 0;
  }

  setCloudBadge("Limpiando Firebase","syncing");

  stopRealtime();

  let total = 0;

  for(const collectionName of ALL_FIREBASE_COLLECTIONS){
    total += await clearCollection(db,collectionName);
  }

  setCloudBadge("Firebase vacío","cloud");

  if(typeof window.toast === "function"){
    window.toast(`Firebase limpiado: ${total} documentos eliminados.`);
  }

  startRealtime();

  return total;
}

// Reemplazo limpio: borra las colecciones y sube la base local como fuente única.
async function replaceFirebaseWithLocal(skipConfirm){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  const username = String(window.session?.usuario || "").toLowerCase();
  if(username !== "austudio"){
    alert("Solo austudio puede reemplazar la base en Firebase.");
    return 0;
  }

  if(!skipConfirm){
    const code = prompt(
      "Esto BORRA la base actual de Firebase y sube la base local como fuente única.\nEscribe REEMPLAZAR para confirmar:"
    );
    if(code !== "REEMPLAZAR"){
      return 0;
    }
  }

  setCloudBadge("Reemplazando base","syncing");
  stopRealtime();

  // 1) Borrar todo lo viejo (evita registros huérfanos).
  for(const collectionName of ALL_FIREBASE_COLLECTIONS){
    await clearCollection(db,collectionName);
  }

  // 2) Subir la base local. uploadCurrentStateToFirebase reinicia el realtime al final.
  const total = await uploadCurrentStateToFirebase();

  // 3) Marcar sembrado: a partir de aquí la nube es la fuente y el realtime ya puede sincronizar.
  markSeeded();
  setCloudBadge("Firebase realtime","cloud");

  if(typeof window.toast === "function"){
    window.toast(`Firebase reemplazado con la base local: ${total} registros.`);
  }

  return total;
}

window.replaceFirebaseWithLocal = replaceFirebaseWithLocal;

async function testConnection(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  await setDoc(doc(db,"sync_logs","test_connection"),{
    ok:true,
    source:"cliotec_erp_v5_adapter",
    fecha:new Date().toISOString(),
    updatedAt:serverTimestamp()
  },{merge:true});

  if(typeof window.toast === "function"){
    window.toast("Conexión Firebase correcta.");
  }

  return true;
}

async function initAutoFirebase(){
  try{
    setCloudBadge("Conectando Firebase","syncing");

    const app = getApps().length
      ? getApp()
      : initializeApp(CLIOTEC_FIREBASE_CONFIG);

    const db = getFirestore(app);

    window._cliotecApp = app;
    window._cliotecDb = db;
    window._fbReady = true;

    window.CliotecFirebase = {
      getApp:()=>app,
      getDb:()=>db,
      isReady:()=>true,
      startRealtime,
      stopRealtime,
      uploadCurrentStateToFirebase,
      replaceFirebaseWithLocal,
      clearFirebaseDatabase,
      testConnection,
      publishDebounced,
      setDoc,
      deleteDoc,
      doc,
      collection,
      onSnapshot,
      writeBatch,
      serverTimestamp
    };

    setCloudBadge("Firebase conectado","cloud");

    if(window.session){
      startRealtime();
    }

    console.log("Cliotec ERP V5 conectado a Firebase.");

  }catch(error){
    console.error("Error inicializando Firebase:", error);

    setCloudBadge("Firebase no conectado","error");

    if(typeof window.toast === "function"){
      window.toast("No se pudo conectar Firebase.",true);
    }
  }
}

window.initAutoFirebase = initAutoFirebase;
window.startRealtime = startRealtime;
window.stopRealtime = stopRealtime;
window.uploadCurrentStateToFirebase = uploadCurrentStateToFirebase;
window.clearFirebaseDatabase = clearFirebaseDatabase;

initAutoFirebase();
</script>
