<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clio Tec Academy ERP V5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#072D5C;
  --blue2:#123C75;
  --orange:#F7941D;
  --bg:#F4F7FB;
  --text:#142033;
  --muted:#6B7280;
  --line:#E5EAF2;
  --green:#16A34A;
  --red:#DC2626;
  --yellow:#D97706;
  --shadow:0 16px 40px rgba(7,45,92,.08);
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

button,input,select,textarea{
  font:inherit;
}

button{
  cursor:pointer;
}

.login{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.08fr .92fr;
  background:
    radial-gradient(circle at 15% 20%,rgba(247,148,29,.22),transparent 28%),
    radial-gradient(circle at 80% 5%,rgba(18,60,117,.25),transparent 32%),
    linear-gradient(135deg,#072D5C,#123C75 54%,#F4F7FB 54%);
}

.loginHero{
  color:white;
  padding:64px;
  display:grid;
  place-items:center;
  text-align:center;
}

.loginMainLogo{
  width:230px;
  height:230px;
  object-fit:contain;
  margin-bottom:24px;
  filter:drop-shadow(0 18px 34px rgba(0,0,0,.22));
}

.loginSystemName{
  font-size:50px;
  line-height:1;
  margin:0;
  letter-spacing:-.05em;
  color:white;
}

.loginBoxWrap{
  display:grid;
  place-items:center;
  padding:30px;
}

.loginBox{
  width:min(430px,100%);
  background:white;
  border-radius:28px;
  padding:34px;
  box-shadow:0 30px 90px rgba(7,45,92,.20);
}

.loginBoxBrand{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
}

.loginBoxLogo{
  width:52px;
  height:52px;
  object-fit:contain;
  border-radius:14px;
  background:#F8FAFC;
  border:1px solid var(--line);
  padding:4px;
}

.loginBoxBrand h2{
  margin:0;
  font-size:26px;
  letter-spacing:-.04em;
}

.loginBoxBrand p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

.field{
  display:grid;
  gap:8px;
  margin-bottom:16px;
}

.field label{
  font-size:13px;
  color:#334155;
  font-weight:700;
}

.field input,
.field select,
.field textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px 14px;
  outline:none;
  background:white;
}

.btn{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  background:var(--blue);
  color:white;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn.secondary{
  background:white;
  color:var(--blue);
  border:1px solid var(--line);
}

.btn.orange{
  background:var(--orange);
  color:#301900;
}

.btn.success{
  background:#DCFCE7;
  color:#166534;
}

.btn.danger{
  background:#FEE2E2;
  color:#991B1B;
}

.btn.sm{
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
}

.app{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:100vh;
}

.sidebar{
  background:linear-gradient(180deg,var(--blue),#061F3F);
  color:white;
  padding:24px 18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:900;
  letter-spacing:-.04em;
}

.logo{
  width:44px;
  height:44px;
  border-radius:14px;
  background:white;
  display:grid;
  place-items:center;
  overflow:hidden;
  padding:4px;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.role{
  display:inline-flex;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  color:rgba(255,255,255,.82);
  font-size:12px;
  font-weight:700;
  margin:20px 0;
}

.navTitle{
  color:rgba(255,255,255,.46);
  font-size:11px;
  letter-spacing:.12em;
  font-weight:900;
  margin:18px 10px 8px;
}

.navBtn{
  width:100%;
  border:0;
  background:transparent;
  color:rgba(255,255,255,.82);
  padding:12px;
  border-radius:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
  font-weight:700;
}

.navBtn:hover,
.navBtn.active{
  background:rgba(255,255,255,.12);
  color:white;
}

.topbar{
  min-height:78px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 32px;
  border-bottom:1px solid var(--line);
  background:rgba(244,247,251,.88);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:10;
}

.topbar h1{
  margin:0;
  font-size:26px;
  letter-spacing:-.04em;
}

.topbar p{
  margin:7px 0 0;
  color:var(--muted);
  font-size:13px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--orange),#FFD18C);
  color:var(--blue);
  display:grid;
  place-items:center;
  font-weight:900;
}

.sys-bdg{
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:36px;
  padding:0 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:white;
  color:var(--blue);
  font-size:12px;
  font-weight:800;
}

.sys-bdg i{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--yellow);
}

.sys-bdg.cloud-ok i{background:var(--green)}
.sys-bdg.cloud-error i{background:var(--red)}
.sys-bdg.cloud-syncing i{background:var(--yellow)}

.content{
  padding:28px 32px 40px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:18px;
  margin-bottom:22px;
}

.card{
  background:white;
  border:1px solid rgba(226,232,240,.9);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
}

.kpiLabel{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

.kpiValue{
  font-size:32px;
  font-weight:900;
  letter-spacing:-.05em;
  margin:10px 0 3px;
  color:var(--blue);
}

.kpiSub{
  font-size:12px;
  color:var(--muted);
}

.grid2{
  display:grid;
  grid-template-columns:1.5fr .9fr;
  gap:20px;
}

.grid3{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:18px;
}

.head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.head h2{
  margin:0;
  font-size:18px;
  letter-spacing:-.03em;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.search{
  min-width:260px;
  flex:1;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  background:white;
}

.chip{
  border:1px solid var(--line);
  background:white;
  color:#334155;
  padding:9px 12px;
  border-radius:999px;
  font-weight:800;
  font-size:12px;
}

.chip.active{
  background:#EAF2FF;
  color:var(--blue);
  border-color:#C7DBFF;
}

.tableWrap{
  overflow:auto;
  border-radius:16px;
  border:1px solid var(--line);
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:14px;
  text-align:left;
  border-bottom:1px solid var(--line);
  font-size:13px;
  white-space:nowrap;
}

th{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  background:#F8FAFC;
}

.badge{
  display:inline-flex;
  border-radius:999px;
  padding:6px 9px;
  font-size:12px;
  font-weight:900;
}

.ok{background:#DCFCE7;color:#166534}
.bad{background:#FEE2E2;color:#991B1B}
.warn{background:#FEF3C7;color:#92400E}
.info{background:#DBEAFE;color:#1E40AF}
.gray{background:#F1F5F9;color:#475569}

.progress{
  width:130px;
  height:9px;
  border-radius:999px;
  background:#E5E7EB;
  overflow:hidden;
}

.progress div{
  height:100%;
  border-radius:999px;
  background:var(--green);
}

.progress.warn div{background:var(--yellow)}
.progress.bad div{background:var(--red)}

.list{
  display:grid;
  gap:10px;
}

.listItem{
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  background:white;
  display:flex;
  justify-content:space-between;
  gap:14px;
}

.muted{
  color:var(--muted);
}

.clickableCard{
  cursor:pointer;
  transition:.18s ease;
  position:relative;
}

.clickableCard:hover{
  transform:translateY(-3px);
  box-shadow:0 22px 55px rgba(7,45,92,.14);
  border-color:rgba(7,45,92,.22);
}

.clickableCard:after{
  content:"Ver detalle";
  position:absolute;
  right:16px;
  top:16px;
  font-size:11px;
  font-weight:900;
  color:var(--orange);
  opacity:0;
  transition:.18s ease;
}

.clickableCard:hover:after{
  opacity:1;
}

.dashboardLink{
  cursor:pointer;
  transition:.18s ease;
}

.dashboardLink:hover{
  border-color:rgba(7,45,92,.25);
  background:#FAFCFF;
  transform:translateX(2px);
}

.detailMiniGrid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
  margin-bottom:18px;
}

.detailMini{
  background:#F8FAFC;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}

.detailMini b{
  color:var(--blue);
  font-size:22px;
  display:block;
  margin-top:4px;
}

.modalBg{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.45);
  display:grid;
  place-items:center;
  z-index:50;
  padding:20px;
}

.modal{
  width:min(880px,100%);
  max-height:90vh;
  overflow:auto;
  background:white;
  border-radius:24px;
  padding:24px;
  box-shadow:0 40px 120px rgba(0,0,0,.28);
}

.modalHead{
  display:flex;
  justify-content:space-between;
  margin-bottom:18px;
}

.formGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.toast{
  position:fixed;
  right:24px;
  bottom:24px;
  background:var(--blue);
  color:white;
  padding:14px 18px;
  border-radius:14px;
  z-index:60;
  font-weight:800;
}

.empty{
  border:1px dashed #CBD5E1;
  border-radius:16px;
  padding:28px;
  text-align:center;
  color:var(--muted);
  background:#FAFCFF;
}

@media(max-width:1100px){
  .login,
  .app,
  .kpis,
  .grid2,
  .grid3,
  .formGrid,
  .detailMiniGrid{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:relative;
    height:auto;
  }

  .topbar{
    position:relative;
    flex-direction:column;
    align-items:flex-start;
  }

  .content{
    padding:18px;
  }

  .loginHero{
    padding:34px;
  }

  .loginSystemName{
    font-size:34px;
  }

  .loginMainLogo{
    width:170px;
    height:170px;
  }
}
</style>
</head>

<body>

<script>
const KEY = "cliotec_erp_v5_firebase";

const DEFAULT = {

    {id:"a2",matricula:"CTA-0002",nombre:"María López",email:"maria@email.com",whatsapp:"3320000002",cursoId:"c2",grupoId:"g2",promotorId:"p1",estado:"Riesgo",financiero:"Vencido",inscripcion:1200,colegiatura:2800,notas:"Dar seguimiento"},
    {id:"a3",matricula:"CTA-0003",nombre:"Carlos Ruiz",email:"carlos@email.com",whatsapp:"3320000003",cursoId:"c3",grupoId:"g3",promotorId:"p2",estado:"Activo",financiero:"Al corriente",inscripcion:1000,colegiatura:2600,notas:"Proyecto pendiente"},
    {id:"a4",matricula:"CTA-0004",nombre:"Ana Torres",email:"ana@email.com",whatsapp:"3320000004",cursoId:"c1",grupoId:"g1",promotorId:"p1",estado:"Pausa",financiero:"Por vencer",inscripcion:1200,colegiatura:2500,notas:"Pausa temporal"}
  ],
  prospectos:[
    {id:"pr1",nombre:"Luis Moreno",whatsapp:"3321112222",cursoInteres:"Excel Profesional",promotorId:"p1",etapa:"Seguimiento",origen:"Facebook",montoEstimado:3700},
    {id:"pr2",nombre:"Fernanda Soto",whatsapp:"3332221111",cursoInteres:"Power BI",promotorId:"p2",etapa:"Nuevo",origen:"Instagram",montoEstimado:4000}
  ],
  pagos:[
    {id:"pg1",alumnoId:"a1",fecha:"2026-06-15",concepto:"Colegiatura Junio",monto:2500,estado:"Pagado"},
    {id:"pg2",alumnoId:"a2",fecha:"2026-06-01",concepto:"Colegiatura Junio",monto:2800,estado:"Vencido"},
    {id:"pg3",alumnoId:"a3",fecha:"2026-06-20",concepto:"Inscripción",monto:1000,estado:"Pagado"},
    {id:"pg4",alumnoId:"a4",fecha:"2026-06-30",concepto:"Colegiatura Julio",monto:2500,estado:"Por vencer"}
  ],
  asistencias:[
    {id:"as1",alumnoId:"a1",grupoId:"g1",docenteId:"d1",fecha:"2026-06-24",estado:"Presente"},
    {id:"as2",alumnoId:"a2",grupoId:"g2",docenteId:"d2",fecha:"2026-06-24",estado:"Falta"},
    {id:"as3",alumnoId:"a3",grupoId:"g3",docenteId:"d1",fecha:"2026-06-22",estado:"Retardo"},
    {id:"as4",alumnoId:"a4",grupoId:"g1",docenteId:"d1",fecha:"2026-06-24",estado:"Justificada"}
  ],
  timeline:[
    {id:"t1",alumnoId:"a1",fecha:"2026-06-10",tipo:"Inscripción",texto:"Alumno inscrito a Excel Profesional."},
    {id:"t2",alumnoId:"a1",fecha:"2026-06-15",tipo:"Pago",texto:"Pago registrado por $2,500."},
    {id:"t3",alumnoId:"a2",fecha:"2026-06-24",tipo:"Asistencia",texto:"Falta registrada. Requiere seguimiento."}
  ]
};

const DEMO_CREDENTIALS = {
  austudio:"soporte2026",
  admin:"cliotec2025",
  ventas:"ventas2026",
  roberto:"maestro2026"
};

const roleNames = {
  superadmin:"Super Admin",
  admin:"Administrador",
  ventas:"Ventas",
  docente:"Docente"
};

function uid(prefix){
  return prefix + Math.random().toString(36).slice(2,9);
}

function currentRoleFromUser(user){
  const username = String(
    user?.usuario ||
    user?.username ||
    user?.user ||
    user?.email ||
    ""
  ).toLowerCase();

  const rawRole = String(
    user?.rol ||
    user?.role ||
    user?.tipo ||
    user?.tipoUsuario ||
    user?.perfil ||
    user?.nivel ||
    ""
  ).toLowerCase();

  if(username === "austudio") return "superadmin";
  if(username === "admin") return "admin";
  if(username === "ventas") return "ventas";
  if(username === "roberto") return "docente";

  if(rawRole.includes("super") || rawRole.includes("soporte")) return "superadmin";
  if(rawRole.includes("admin")) return "admin";
  if(rawRole.includes("venta") || rawRole.includes("promotor")) return "ventas";
  if(rawRole.includes("docente") || rawRole.includes("maestro") || rawRole.includes("profesor")) return "docente";

  return "admin";
}

function normalizeUser(user){
  const username = String(
    user?.usuario ||
    user?.username ||
    user?.user ||
    user?.email ||
    ""
  ).toLowerCase();

  const safePass =
    user?.pass ||
    user?.password ||
    user?.contrasena ||
    user?.contraseña ||
    DEMO_CREDENTIALS[username] ||
    "";

  return {
    ...user,
    id:user?.id || username || uid("u"),
    nombre:user?.nombre || user?.name || user?.displayName || username || "Usuario",
    usuario:username,
    pass:safePass,
    rol:currentRoleFromUser(user),
    activo:user?.activo !== false
  };
}

function normalizeState(raw){
  const base = structuredClone(DEFAULT);
  const next = {...base, ...(raw || {})};

  Object.keys(base).forEach(key=>{
    if(!Array.isArray(next[key])){
      next[key] = base[key];
    }
  });

  next.users = next.users.map(normalizeUser);

  if(!next.users.some(u=>u.usuario === "austudio")){
    next.users.unshift(normalizeUser(DEFAULT.users[0]));
  }

  return next;
}

function load(){
  const raw = localStorage.getItem(KEY);

  if(!raw){
    localStorage.setItem(KEY,JSON.stringify(DEFAULT));
    return structuredClone(DEFAULT);
  }

  try{
    return JSON.parse(raw);
  }catch(e){
    return structuredClone(DEFAULT);
  }
}

let state = normalizeState(load());
let session = null;
let view = "dashboard";
let filter = "Todos";
let tempAttendance = {};

window.state = state;
window.session = session;
window.APP_KEY = KEY;

const MENU = [
  {id:"dashboard",label:"Dashboard",group:"GENERAL",roles:["superadmin","admin","ventas","docente"]},
  {id:"alumnos",label:"Alumnos",group:"OPERACIÓN",roles:["superadmin","admin","ventas","docente"]},
  {id:"prospectos",label:"Prospectos",group:"OPERACIÓN",roles:["superadmin","admin","ventas"]},
  {id:"grupos",label:"Grupos",group:"OPERACIÓN",roles:["superadmin","admin","docente"]},
  {id:"asistencia",label:"Asistencia",group:"OPERACIÓN",roles:["superadmin","admin","docente"]},
  {id:"pagos",label:"Pagos",group:"FINANZAS",roles:["superadmin","admin","ventas"]},
  {id:"cobranza",label:"Cobranza",group:"FINANZAS",roles:["superadmin","admin"]},
  {id:"nomina",label:"Nómina",group:"FINANZAS",roles:["superadmin","admin"]},
  {id:"reportes",label:"Reportes",group:"ADMINISTRACIÓN",roles:["superadmin","admin","ventas","docente"]},
  {id:"usuarios",label:"Usuarios",group:"ADMINISTRACIÓN",roles:["superadmin","admin"]},
  {id:"config",label:"Configuración",group:"ADMINISTRACIÓN",roles:["superadmin"]}
];

function save(){
  state = normalizeState(state);
  localStorage.setItem(KEY,JSON.stringify(state));
  window.state = state;

  if(!window.__cliotecApplyingRemote && window.CliotecFirebase?.publishDebounced){
    window.CliotecFirebase.publishDebounced();
  }
}

function applyRemoteState(nextState){
  state = normalizeState(nextState);
  window.state = state;
  localStorage.setItem(KEY,JSON.stringify(state));

  if(session){
    session = normalizeUser(session);
    window.session = session;
    render();
  }
}

window.applyRemoteState = applyRemoteState;

function resetDemo(){
  state = normalizeState(structuredClone(DEFAULT));
  save();
  toast("Datos demo restaurados");
  render();
}

function money(n){
  return Number(n || 0).toLocaleString("es-MX",{style:"currency",currency:"MXN"});
}

function by(list,id){
  return (state[list] || []).find(x=>x.id === id);
}

function currentRole(){
  return currentRoleFromUser(session);
}

function allowed(item){
  return item.roles.includes(currentRole());
}

function filteredAlumnos(){
  let data = [...(state.alumnos || [])];
  const role = currentRole();

  if(role === "ventas"){
    data = data.filter(a=>a.promotorId === session.promotorId || session.usuario === "ventas");
  }

  if(role === "docente"){
    const grupos = (state.grupos || [])
      .filter(g=>g.docenteId === session.docenteId || session.usuario === "roberto")
      .map(g=>g.id);

    data = data.filter(a=>grupos.includes(a.grupoId));
  }

  return data;
}

function filteredProspectos(){
  let data = [...(state.prospectos || [])];

  if(currentRole() === "ventas"){
    data = data.filter(p=>p.promotorId === session.promotorId || session.usuario === "ventas");
  }

  return data;
}

function filteredGrupos(){
  let data = [...(state.grupos || [])];

  if(currentRole() === "docente"){
    data = data.filter(g=>g.docenteId === session.docenteId || session.usuario === "roberto");
  }

  return data;
}

function filteredPagos(){
  let data = [...(state.pagos || [])];

  if(currentRole() === "ventas"){
    const ids = filteredAlumnos().map(a=>a.id);
    data = data.filter(p=>ids.includes(p.alumnoId));
  }

  return data;
}

function asistenciaPct(id){
  const rows = (state.asistencias || []).filter(a=>a.alumnoId === id);

  if(!rows.length){
    return 100;
  }

  const points = rows.map(r=>{
    if(r.estado === "Presente") return 1;
    if(r.estado === "Retardo") return .5;
    if(r.estado === "Justificada") return 1;
    return 0;
  });

  return Math.round(points.reduce((a,b)=>a+b,0) / rows.length * 100);
}

function badge(status){
  const s = String(status || "");
  let cls = "gray";

  if(s.includes("Activo") || s.includes("Pagado") || s.includes("Presente") || s.includes("Al corriente")) cls = "ok";
  if(s.includes("Riesgo") || s.includes("Vencido") || s.includes("Falta")) cls = "bad";
  if(s.includes("Pausa") || s.includes("Por vencer") || s.includes("Retardo") || s.includes("Seguimiento")) cls = "warn";
  if(s.includes("Justificada") || s.includes("Nuevo") || s.includes("Por iniciar")) cls = "info";

  return `<span class="badge ${cls}">${s}</span>`;
}

    root.innerHTML = loginTemplate();

function login(e){
  e.preventDefault();

  const user = document.getElementById("loginUser").value.trim().toLowerCase();
  const pass = document.getElementById("loginPass").value;

  let found = (state.users || []).find(u=>{
    const normalized = normalizeUser(u);

    return normalized.usuario === user && (
      String(normalized.pass) === pass ||
      DEMO_CREDENTIALS[normalized.usuario] === pass
    );
  });

  if(!found){
    found = DEFAULT.users.find(u=>u.usuario.toLowerCase() === user && u.pass === pass);
  }

  if(!found){
    toast("Usuario o contraseña incorrectos",true);
    return;
  }

  session = normalizeUser(found);
  window.session = session;

  view = "dashboard";
  render();

  setTimeout(()=>{
    window.CliotecFirebase?.startRealtime?.();
  },300);
}

function logout(){
  session = null;
  window.session = null;

  if(window.CliotecFirebase?.stopRealtime){
    window.CliotecFirebase.stopRealtime();
  }

  render();
}

      </div>

      <div class="role">${session.nombre || session.usuario} · ${roleNames[currentRole()]}</div>

function renderView(){

    openModal("Cobranza pendiente",`

    openModal("Riesgo académico",`
      <div class="detailMiniGrid">

  if(type === "actividad"){
    openModal("Actividad reciente",`
      <div class="list">
        ${
          (state.timeline || []).slice().reverse().map(t=>`
          <div class="listItem dashboardLink" onclick="openTimelineDetail('${t.id}')">

function guardarAsistencia(){
  const grupoId = window.selectedGrupo;
  const grupo = by("grupos",grupoId);
  const fecha = document.getElementById("fechaAsistencia").value;
  const alumnos = filteredAlumnos().filter(a=>a.grupoId === grupoId);

  if(!grupo){
    toast("Selecciona un grupo válido.",true);
    return;
  }

  alumnos.forEach(a=>{
    const estado = tempAttendance[a.id] || "Presente";

    state.asistencias.push({
      id:uid("as"),
      alumnoId:a.id,
      grupoId,
      docenteId:grupo.docenteId,
      fecha,
      estado
    });

    state.timeline.push({
      id:uid("t"),
      alumnoId:a.id,
      fecha,
      tipo:"Asistencia",
      texto:`${estado} registrado en ${grupo.nombre}.`
    });
  });

  save();
  toast("Asistencia guardada");
  asistencia();
}

  try{
    if(typeof window.applyRemoteState === "function"){
      window.applyRemoteState(nextState);
      return;
    }

    window.state = nextState;

    localStorage.setItem(
      window.APP_KEY || "cliotec_erp_v5_firebase",
      JSON.stringify(nextState)
    );

    if(typeof window.renderView === "function" && window.session){

}

function normalizeDoc(firebaseDoc){
  const data = firebaseDoc.data();

  return {
    id:data.id ?? firebaseDoc.id,
    ...data
  };
}

function normalizeRemoteRows(stateKey, rows){
  if(stateKey === "users" && typeof window.normalizeUser === "function"){
    return rows.map(window.normalizeUser);
  }

  return rows;
}

function stopRealtime(){
  (window.__cliotecRealtimeUnsubs || []).forEach(unsubscribe=>{
    try{
      unsubscribe();
    }catch(error){
      console.warn("No se pudo detener listener:", error);
    }
  });

  window.__cliotecRealtimeUnsubs = [];
  window.__cliotecFirebaseStarted = false;
}

function startRealtime(){
  const db = window._cliotecDb;

  if(!db){
    console.warn("Firebase todavía no está inicializado.");
    return;
  }

  if(window.__cliotecFirebaseStarted){
    return;
  }

  window.__cliotecFirebaseStarted = true;

  setCloudBadge("Firebase realtime","cloud");

  Object.entries(COLLECTION_MAP).forEach(([stateKey,collectionName])=>{
    const unsubscribe = onSnapshot(
      collection(db,collectionName),
      snapshot=>{
        if(window.__cliotecApplyingRemote){
          return;
        }

        if(snapshot.empty){
          return;
        }

        const currentState = getLocalState();
        const remoteRows = normalizeRemoteRows(
          stateKey,
          snapshot.docs.map(normalizeDoc)
        );

        const nextState = {
          ...currentState,
          [stateKey]:remoteRows
        };

        window.__cliotecApplyingRemote = true;
        saveLocalState(nextState);
        window.__cliotecApplyingRemote = false;
      },
      error=>{
        console.error(`Error escuchando ${collectionName}:`, error);
        setCloudBadge("Error Firebase","error");

        if(typeof window.toast === "function"){
          window.toast("Error de sincronización Firebase.",true);
        }
      }
    );

    window.__cliotecRealtimeUnsubs.push(unsubscribe);
  });
}

async function uploadCurrentStateToFirebase(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  const currentState = getLocalState();

  setCloudBadge("Subiendo Firebase","syncing");

  stopRealtime();

  let total = 0;

  for(const [stateKey,collectionName] of Object.entries(COLLECTION_MAP)){
    const rows = Array.isArray(currentState[stateKey])
      ? currentState[stateKey]
      : [];

    if(!rows.length){
      continue;
    }

    const batch = writeBatch(db);

    rows.forEach((row,index)=>{
      const safeId = String(
        row.id ||
        row.usuario ||
        row.matricula ||
        `${stateKey}_${index}_${Date.now()}`
      );

      batch.set(doc(db,collectionName,safeId),{
        ...row,
        id:row.id || safeId,
        updatedAt:serverTimestamp()
      },{merge:true});

      total++;
    });

    await batch.commit();
  }

  await setDoc(doc(db,"sync_logs","last_manual_upload"),{
    tipo:"manual_upload",
    total,
    fecha:new Date().toISOString(),
    updatedAt:serverTimestamp()
  },{merge:true});

  setCloudBadge("Firebase realtime","cloud");

  if(typeof window.toast === "function"){
    window.toast(`Base subida a Firebase: ${total} registros.`);
  }

  startRealtime();

  return total;
}

function publishDebounced(){
  clearTimeout(publishTimer);

  publishTimer = setTimeout(()=>{
    uploadCurrentStateToFirebase().catch(error=>{
      console.warn("No se autopublicó en Firebase:", error.message);
    });
  },1400);
}

async function clearCollection(db,collectionName){
  let total = 0;

  while(true){
    const snapshot = await getDocs(collection(db,collectionName));

    if(snapshot.empty){
      break;
    }

    const docs = snapshot.docs.slice(0,400);
    const batch = writeBatch(db);

    docs.forEach(item=>{
      batch.delete(doc(db,collectionName,item.id));
    });

    await batch.commit();

    total += docs.length;

    if(snapshot.size <= 400){
      break;
    }
  }

  return total;
}

async function clearFirebaseDatabase(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  const username = String(window.session?.usuario || "").toLowerCase();

  if(username !== "austudio"){
    alert("Solo austudio puede limpiar Firebase.");
    return 0;
  }

  const code = prompt(
    "Esta acción eliminará la base Firestore de prueba. Escribe LIMPIAR para confirmar:"
  );

  if(code !== "LIMPIAR"){
    return 0;
  }

  setCloudBadge("Limpiando Firebase","syncing");

  stopRealtime();

  let total = 0;

  for(const collectionName of ALL_FIREBASE_COLLECTIONS){
    total += await clearCollection(db,collectionName);
  }

  setCloudBadge("Firebase vacío","cloud");

  if(typeof window.toast === "function"){
    window.toast(`Firebase limpiado: ${total} documentos eliminados.`);
  }

  startRealtime();

  return total;
}

async function testConnection(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  await setDoc(doc(db,"sync_logs","test_connection"),{
    ok:true,
    source:"cliotec_erp_v5_adapter",
    fecha:new Date().toISOString(),
    updatedAt:serverTimestamp()
  },{merge:true});

  if(typeof window.toast === "function"){
    window.toast("Conexión Firebase correcta.");
  }

  return true;
}

async function initAutoFirebase(){
  try{
    setCloudBadge("Conectando Firebase","syncing");

    const app = getApps().length
      ? getApp()
      : initializeApp(CLIOTEC_FIREBASE_CONFIG);

    const db = getFirestore(app);

    window._cliotecApp = app;
    window._cliotecDb = db;
    window._fbReady = true;

    window.CliotecFirebase = {
      getApp:()=>app,
      getDb:()=>db,
      isReady:()=>true,
      startRealtime,
      stopRealtime,
      uploadCurrentStateToFirebase,
      clearFirebaseDatabase,
      testConnection,
      publishDebounced,
      setDoc,
      deleteDoc,
      doc,
      collection,
      onSnapshot,
      writeBatch,
      serverTimestamp
    };

    setCloudBadge("Firebase conectado","cloud");

    if(window.session){
      startRealtime();
    }

    console.log("Cliotec ERP V5 conectado a Firebase.");

  }catch(error){
    console.error("Error inicializando Firebase:", error);

    setCloudBadge("Firebase no conectado","error");

    if(typeof window.toast === "function"){
      window.toast("No se pudo conectar Firebase.",true);
    }
  }
}

window.initAutoFirebase = initAutoFirebase;
window.startRealtime = startRealtime;
window.stopRealtime = stopRealtime;
window.uploadCurrentStateToFirebase = uploadCurrentStateToFirebase;
window.clearFirebaseDatabase = clearFirebaseDatabase;

initAutoFirebase();
</script>
