<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clio Tec Academy ERP V5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#072D5C;
  --blue2:#123C75;
  --orange:#F7941D;
  --bg:#F4F7FB;
  --text:#142033;
  --muted:#6B7280;
  --line:#E5EAF2;
  --green:#16A34A;
  --red:#DC2626;
  --yellow:#D97706;
  --shadow:0 16px 40px rgba(7,45,92,.08);
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

button,input,select,textarea{
  font:inherit;
}

button{
  cursor:pointer;
}

.login{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.08fr .92fr;
  background:
    radial-gradient(circle at 15% 20%,rgba(247,148,29,.22),transparent 28%),
    radial-gradient(circle at 80% 5%,rgba(18,60,117,.25),transparent 32%),
    linear-gradient(135deg,#072D5C,#123C75 54%,#F4F7FB 54%);
}

.loginHero{
  color:white;
  padding:64px;
  display:grid;
  place-items:center;
  text-align:center;
}

.loginMainLogo{
  width:230px;
  height:230px;
  object-fit:contain;
  margin-bottom:24px;
  filter:drop-shadow(0 18px 34px rgba(0,0,0,.22));
}

.loginSystemName{
  font-size:50px;
  line-height:1;
  margin:0;
  letter-spacing:-.05em;
  color:white;
}

.loginBoxWrap{
  display:grid;
  place-items:center;
  padding:30px;
}

.loginBox{
  width:min(430px,100%);
  background:white;
  border-radius:28px;
  padding:34px;
  box-shadow:0 30px 90px rgba(7,45,92,.20);
}

.loginBoxBrand{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
}

.loginBoxLogo{
  width:52px;
  height:52px;
  object-fit:contain;
  border-radius:14px;
  background:#F8FAFC;
  border:1px solid var(--line);
  padding:4px;
}

.loginBoxBrand h2{
  margin:0;
  font-size:26px;
  letter-spacing:-.04em;
}

.loginBoxBrand p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

.field{
  display:grid;
  gap:8px;
  margin-bottom:16px;
}

.field label{
  font-size:13px;
  color:#334155;
  font-weight:700;
}

.field input,
.field select,
.field textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px 14px;
  outline:none;
  background:white;
}

.btn{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  background:var(--blue);
  color:white;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn.secondary{
  background:white;
  color:var(--blue);
  border:1px solid var(--line);
}

.btn.orange{
  background:var(--orange);
  color:#301900;
}

.btn.success{
  background:#DCFCE7;
  color:#166534;
}

.btn.danger{
  background:#FEE2E2;
  color:#991B1B;
}

.btn.sm{
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
}

.app{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:100vh;
}

.sidebar{
  background:linear-gradient(180deg,var(--blue),#061F3F);
  color:white;
  padding:24px 18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:900;
  letter-spacing:-.04em;
}

.logo{
  width:44px;
  height:44px;
  border-radius:14px;
  background:white;
  display:grid;
  place-items:center;
  overflow:hidden;
  padding:4px;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.role{
  display:inline-flex;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  color:rgba(255,255,255,.82);
  font-size:12px;
  font-weight:700;
  margin:20px 0;
}

.navTitle{
  color:rgba(255,255,255,.46);
  font-size:11px;
  letter-spacing:.12em;
  font-weight:900;
  margin:18px 10px 8px;
}

.navBtn{
  width:100%;
  border:0;
  background:transparent;
  color:rgba(255,255,255,.82);
  padding:12px;
  border-radius:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
  font-weight:700;
}

.navBtn:hover,
.navBtn.active{
  background:rgba(255,255,255,.12);
  color:white;
}

.topbar{
  min-height:78px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 32px;
  border-bottom:1px solid var(--line);
  background:rgba(244,247,251,.88);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:10;
}

.topbar h1{
  margin:0;
  font-size:26px;
  letter-spacing:-.04em;
}

.topbar p{
  margin:7px 0 0;
  color:var(--muted);
  font-size:13px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--orange),#FFD18C);
  color:var(--blue);
  display:grid;
  place-items:center;
  font-weight:900;
}

.sys-bdg{
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:36px;
  padding:0 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:white;
  color:var(--blue);
  font-size:12px;
  font-weight:800;
}

.sys-bdg i{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--yellow);
}

.sys-bdg.cloud-ok i{background:var(--green)}
.sys-bdg.cloud-error i{background:var(--red)}
.sys-bdg.cloud-syncing i{background:var(--yellow)}

.content{
  padding:28px 32px 40px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:18px;
  margin-bottom:22px;
}

.card{
  background:white;
  border:1px solid rgba(226,232,240,.9);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
}

.kpiLabel{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

.kpiValue{
  font-size:32px;
  font-weight:900;
  letter-spacing:-.05em;
  margin:10px 0 3px;
  color:var(--blue);
}

.kpiSub{
  font-size:12px;
  color:var(--muted);
}

.grid2{
  display:grid;
  grid-template-columns:1.5fr .9fr;
  gap:20px;
}

.grid3{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:18px;
}

.head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.head h2{
  margin:0;
  font-size:18px;
  letter-spacing:-.03em;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.search{
  min-width:260px;
  flex:1;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  background:white;
}

.chip{
  border:1px solid var(--line);
  background:white;
  color:#334155;
  padding:9px 12px;
  border-radius:999px;
  font-weight:800;
  font-size:12px;
}

.chip.active{
  background:#EAF2FF;
  color:var(--blue);
  border-color:#C7DBFF;
}

.tableWrap{
  overflow:auto;
  border-radius:16px;
  border:1px solid var(--line);
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:14px;
  text-align:left;
  border-bottom:1px solid var(--line);
  font-size:13px;
  white-space:nowrap;
}

th{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  background:#F8FAFC;
}

.badge{
  display:inline-flex;
  border-radius:999px;
  padding:6px 9px;
  font-size:12px;
  font-weight:900;
}

.ok{background:#DCFCE7;color:#166534}
.bad{background:#FEE2E2;color:#991B1B}
.warn{background:#FEF3C7;color:#92400E}
.info{background:#DBEAFE;color:#1E40AF}
.gray{background:#F1F5F9;color:#475569}

.progress{
  width:130px;
  height:9px;
  border-radius:999px;
  background:#E5E7EB;
  overflow:hidden;
}

.progress div{
  height:100%;
  border-radius:999px;
  background:var(--green);
}

.progress.warn div{background:var(--yellow)}
.progress.bad div{background:var(--red)}

.list{
  display:grid;
  gap:10px;
}

.listItem{
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  background:white;
  display:flex;
  justify-content:space-between;
  gap:14px;
}

.muted{
  color:var(--muted);
}

.clickableCard{
  cursor:pointer;
  transition:.18s ease;
  position:relative;
}

.clickableCard:hover{
  transform:translateY(-3px);
  box-shadow:0 22px 55px rgba(7,45,92,.14);
  border-color:rgba(7,45,92,.22);
}

.clickableCard:after{
  content:"Ver detalle";
  position:absolute;
  right:16px;
  top:16px;
  font-size:11px;
  font-weight:900;
  color:var(--orange);
  opacity:0;
  transition:.18s ease;
}

.clickableCard:hover:after{
  opacity:1;
}

.dashboardLink{
  cursor:pointer;
  transition:.18s ease;
}

.dashboardLink:hover{
  border-color:rgba(7,45,92,.25);
  background:#FAFCFF;
  transform:translateX(2px);
}

.detailMiniGrid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
  margin-bottom:18px;
}

.detailMini{
  background:#F8FAFC;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}

.detailMini b{
  color:var(--blue);
  font-size:22px;
  display:block;
  margin-top:4px;
}

.modalBg{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.45);
  display:grid;
  place-items:center;
  z-index:50;
  padding:20px;
}

.modal{
  width:min(880px,100%);
  max-height:90vh;
  overflow:auto;
  background:white;
  border-radius:24px;
  padding:24px;
  box-shadow:0 40px 120px rgba(0,0,0,.28);
}

.modalHead{
  display:flex;
  justify-content:space-between;
  margin-bottom:18px;
}

.formGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.toast{
  position:fixed;
  right:24px;
  bottom:24px;
  background:var(--blue);
  color:white;
  padding:14px 18px;
  border-radius:14px;
  z-index:60;
  font-weight:800;
}

.empty{
  border:1px dashed #CBD5E1;
  border-radius:16px;
  padding:28px;
  text-align:center;
  color:var(--muted);
  background:#FAFCFF;
}

@media(max-width:1100px){
  .login,
  .app,
  .kpis,
  .grid2,
  .grid3,
  .formGrid,
  .detailMiniGrid{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:relative;
    height:auto;
  }

  .topbar{
    position:relative;
    flex-direction:column;
    align-items:flex-start;
  }

  .content{
    padding:18px;
  }

  .loginHero{
    padding:34px;
  }

  .loginSystemName{
    font-size:34px;
  }

  .loginMainLogo{
    width:170px;
    height:170px;
  }
}
</style>
</head>

    {id:"tab3",nombre:"Nivel 3 (11-15 alumnos)",minAlumnos:11,maxAlumnos:15,tarifaHora:300},
    {id:"tab4",nombre:"Nivel 4 (16+ alumnos)",minAlumnos:16,maxAlumnos:999,tarifaHora:350}
  ],
  comisiones:{pctInscripcion:10,pctColegiatura:5}
};

const DEMO_CREDENTIALS = {
  austudio:"soporte2026",
  admin:"cliotec2025",
  ventas:"ventas2026",
  roberto:"maestro2026"
};

const roleNames = {
  superadmin:"Super Admin",
  admin:"Administrador",
  ventas:"Ventas",
  docente:"Docente"
};

function uid(prefix){
  return prefix + Math.random().toString(36).slice(2,9);
}

function currentRoleFromUser(user){
  const username = String(
    user?.usuario ||
    user?.username ||
    user?.user ||
    user?.email ||
    ""
  ).toLowerCase();

  const rawRole = String(
    user?.rol ||
    user?.role ||
    user?.tipo ||
    user?.tipoUsuario ||
    user?.perfil ||
    user?.nivel ||
    ""
  ).toLowerCase();

  if(username === "austudio") return "superadmin";
  if(username === "admin") return "admin";
  if(username === "ventas") return "ventas";
  if(username === "roberto") return "docente";

  if(rawRole.includes("super") || rawRole.includes("soporte")) return "superadmin";
  if(rawRole.includes("admin")) return "admin";
  if(rawRole.includes("venta") || rawRole.includes("promotor")) return "ventas";
  if(rawRole.includes("docente") || rawRole.includes("maestro") || rawRole.includes("profesor")) return "docente";

  return "admin";
}

function normalizeUser(user){
  const username = String(
    user?.usuario ||
    user?.username ||
    user?.user ||
    user?.email ||
    ""
  ).toLowerCase();

  const safePass =
    user?.pass ||
    user?.password ||
    user?.contrasena ||
    user?.contraseña ||
    DEMO_CREDENTIALS[username] ||
    "";

  return {
    ...user,
    id:user?.id || username || uid("u"),
    nombre:user?.nombre || user?.name || user?.displayName || username || "Usuario",
    usuario:username,
    pass:safePass,
    rol:currentRoleFromUser(user),
    activo:user?.activo !== false
  };
}

function normalizeState(raw){
  const base = structuredClone(DEFAULT);
  const next = {...base, ...(raw || {})};

  Object.keys(base).forEach(key=>{
    if(Array.isArray(base[key])){
      if(!Array.isArray(next[key])) next[key] = base[key];
    } else if(typeof base[key]==="object" && base[key]!==null){
      if(typeof next[key]!=="object" || next[key]===null) next[key] = base[key];
    }
  });

  next.users = next.users.map(normalizeUser);

  if(!next.users.some(u=>u.usuario === "austudio")){
    next.users.unshift(normalizeUser(DEFAULT.users[0]));
  }

  return next;
}

function load(){
  const raw = localStorage.getItem(KEY);

  if(!raw){
    localStorage.setItem(KEY,JSON.stringify(DEFAULT));
    return structuredClone(DEFAULT);
  }

  try{
    return JSON.parse(raw);
  }catch(e){
    return structuredClone(DEFAULT);
  }
}

let state = normalizeState(load());

let filter = "Todos";

  {id:"finanzas",label:"Finanzas",group:"FINANZAS",roles:["superadmin","admin"]},
  {id:"reportes",label:"Reportes",group:"ADMINISTRACIÓN",roles:["superadmin","admin","ventas","docente"]},
  {id:"usuarios",label:"Usuarios",group:"ADMINISTRACIÓN",roles:["superadmin","admin"]},
  {id:"config",label:"Configuración",group:"ADMINISTRACIÓN",roles:["superadmin"]}
];

function save(){
  state = normalizeState(state);
  localStorage.setItem(KEY,JSON.stringify(state));
  window.state = state;

  if(!window.__cliotecApplyingRemote && window.CliotecFirebase?.publishDebounced){
    window.CliotecFirebase.publishDebounced();
  }
}

function applyRemoteState(nextState){
  state = normalizeState(nextState);
  window.state = state;
  localStorage.setItem(KEY,JSON.stringify(state));

  if(session){
    session = normalizeUser(session);
    window.session = session;
    render();
  }
}

window.applyRemoteState = applyRemoteState;

function resetDemo(){
  state = normalizeState(structuredClone(DEFAULT));
  save();
  toast("Datos demo restaurados");
  render();
}

function money(n){
  return Number(n || 0).toLocaleString("es-MX",{style:"currency",currency:"MXN"});
}

function by(list,id){
  return (state[list] || []).find(x=>x.id === id);
}

function currentRole(){
  return currentRoleFromUser(session);
}

function allowed(item){
  return item.roles.includes(currentRole());
}

function filteredAlumnos(){
  let data = [...(state.alumnos || [])];
  const role = currentRole();

  if(role === "ventas"){
    data = data.filter(a=>a.promotorId === session.promotorId || session.usuario === "ventas");
  }

  if(role === "docente"){
    const grupos = (state.grupos || [])
      .filter(g=>g.docenteId === session.docenteId || session.usuario === "roberto")
      .map(g=>g.id);

    data = data.filter(a=>grupos.includes(a.grupoId));
  }

  return data;
}

function filteredProspectos(){
  let data = [...(state.prospectos || [])];

  if(currentRole() === "ventas"){
    data = data.filter(p=>p.promotorId === session.promotorId || session.usuario === "ventas");
  }

  return data;
}

function filteredGrupos(){
  let data = [...(state.grupos || [])];

  if(currentRole() === "docente"){
    data = data.filter(g=>g.docenteId === session.docenteId || session.usuario === "roberto");
  }

  return data;
}

function filteredPagos(){
  let data = [...(state.pagos || [])];

  if(currentRole() === "ventas"){
    const ids = filteredAlumnos().map(a=>a.id);
    data = data.filter(p=>ids.includes(p.alumnoId));
  }

  return data;
}

function asistenciaPct(id){
  const rows = (state.asistencias || []).filter(a=>a.alumnoId === id);

  if(!rows.length){
    return 100;
  }

  const points = rows.map(r=>{
    if(r.estado === "Presente") return 1;
    if(r.estado === "Retardo") return .5;
    if(r.estado === "Justificada") return 1;
    return 0;
  });

  return Math.round(points.reduce((a,b)=>a+b,0) / rows.length * 100);
}

function badge(status){
  const s = String(status || "");
  let cls = "gray";

  if(s.includes("Activo") || s.includes("Pagado") || s.includes("Presente") || s.includes("Al corriente")) cls = "ok";
  if(s.includes("Riesgo") || s.includes("Vencido") || s.includes("Falta")) cls = "bad";
  if(s.includes("Pausa") || s.includes("Por vencer") || s.includes("Retardo") || s.includes("Seguimiento")) cls = "warn";
  if(s.includes("Justificada") || s.includes("Nuevo") || s.includes("Por iniciar")) cls = "info";

  return `<span class="badge ${cls}">${s}</span>`;
}

function render(){
  const root = document.getElementById("root");

  if(!session){
    root.innerHTML = loginTemplate();
    return;
  }

  root.innerHTML = appTemplate();
  renderView();
}

function login(e){
  e.preventDefault();

  const user = document.getElementById("loginUser").value.trim().toLowerCase();
  const pass = document.getElementById("loginPass").value;

  let found = (state.users || []).find(u=>{
    const normalized = normalizeUser(u);

    return normalized.usuario === user && (
      String(normalized.pass) === pass ||
      DEMO_CREDENTIALS[normalized.usuario] === pass
    );
  });

  if(!found){
    found = DEFAULT.users.find(u=>u.usuario.toLowerCase() === user && u.pass === pass);
  }

  if(!found){
    toast("Usuario o contraseña incorrectos",true);
    return;
  }

  session = normalizeUser(found);
  window.session = session;

  view = "dashboard";
  render();

  setTimeout(()=>{
    window.CliotecFirebase?.startRealtime?.();
  },300);
}

function logout(){
  session = null;
  window.session = null;

  if(window.CliotecFirebase?.stopRealtime){
    window.CliotecFirebase.stopRealtime();
  }

  render();
}

function appTemplate(){
  const groups = {};

  MENU.filter(allowed).forEach(m=>{

  });

  const nav = Object.entries(groups).map(([group,items])=>`
    <div>
      <div class="navTitle">${group}</div>
      ${items.map(i=>`
        <button class="navBtn ${view === i.id ? "active" : ""}" onclick="go('${i.id}')">
          <span>${i.label}</span>
          <span>›</span>
        </button>
      `).join("")}
    </div>
  `).join("");

  return `
  <section class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">
          <img src="./logo.png" alt="Clio Tec Academy">
        </div>
        <div>Clio Tec ERP<br><span style="opacity:.72;font-size:12px;letter-spacing:0">Academy V5</span></div>
      </div>

      <div class="role">${session.nombre || session.usuario} · ${roleNames[currentRole()]}</div>

      ${nav}

      <button class="navBtn" onclick="logout()">Cerrar sesión</button>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <h1 id="title">Dashboard</h1>
          <p id="subtitle">Resumen general</p>
        </div>

        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span class="sys-bdg" id="cloudBadge">
            <i></i>
            <span>Firebase pendiente</span>
          </span>

          <button class="btn secondary sm" onclick="window.CliotecFirebase?.uploadCurrentStateToFirebase?.()">
            Subir a Firebase
          </button>

          <button class="btn secondary sm" onclick="resetDemo()">Restaurar demo</button>

          <div class="avatar">${(session.nombre || session.usuario || "U").charAt(0)}</div>
        </div>
      </header>

    </main>
  </section>`;
}

function go(v){
  view = v;

  renderView();
}

function setTitle(title,subtitle){
  document.getElementById("title").textContent = title;
  document.getElementById("subtitle").textContent = subtitle;
}

function renderView(){
  const valid = MENU.find(m=>m.id === view && allowed(m));

  if(!valid){
    view = "dashboard";
  }

  const views = {
    dashboard,
    calendario,
    alumnos,
    prospectos,
    grupos,
    asistencia,
    pagos,
    cobranza,
    nomina,
    finanzas,
    reportes,
    usuarios,
    config
  };

  views[view]();
}

function kpi(label,value,sub){
  return `

    <div class="kpiValue">${value}</div>
    <div class="kpiSub">${sub}</div>
  </div>`;

    <div class="kpiLabel">${label}</div>
    <div class="kpiValue">${value}</div>
    <div class="kpiSub">${sub}</div>
  </div>`;
}

function openDashboardDetail(type){

  const pagos = filteredPagos();

  if(type === "alumnosActivos"){

    openModal("Alumnos activos",`
      <div class="detailMiniGrid">
        <div class="detailMini">Total<b>${data.length}</b></div>

      </div>
      ${tableAlumnos(data)}
    `);
  }

  if(type === "ingresos"){
    const data = pagos.filter(p=>p.estado === "Pagado");
    const total = data.reduce((s,p)=>s+p.monto,0);

    openModal("Ingresos registrados",`
      <div class="detailMiniGrid">
        <div class="detailMini">Total cobrado<b>${money(total)}</b></div>
        <div class="detailMini">Pagos<b>${data.length}</b></div>
        <div class="detailMini">Promedio<b>${money(total / (data.length || 1))}</b></div>
      </div>
      ${tablePagos(data)}
    `);
  }

  if(type === "cobranza"){
    const data = pagos.filter(p=>p.estado === "Vencido");
    const total = data.reduce((s,p)=>s+p.monto,0);

    openModal("Cobranza pendiente",`
      <div class="detailMiniGrid">
        <div class="detailMini">Total vencido<b>${money(total)}</b></div>
        <div class="detailMini">Casos<b>${data.length}</b></div>
        <div class="detailMini">Prioridad<b>Alta</b></div>
      </div>

      <div class="list">
        ${
          data.map(p=>`
          <div class="listItem">
            <div>
              <b>${by("alumnos",p.alumnoId)?.nombre || "-"}</b>

        }
      </div>
    `);
  }

  if(type === "riesgo"){
    const data = alumnos.filter(a=>a.estado === "Riesgo" || asistenciaPct(a.id) < 70);

    openModal("Riesgo académico",`
      <div class="detailMiniGrid">
        <div class="detailMini">Alumnos en riesgo<b>${data.length}</b></div>
        <div class="detailMini">Baja asistencia<b>${data.filter(a=>asistenciaPct(a.id)<70).length}</b></div>
        <div class="detailMini">Seguimiento<b>Requerido</b></div>
      </div>
      ${tableAlumnos(data)}
    `);
  }

  if(type === "actividad"){
    openModal("Actividad reciente",`
      <div class="list">
        ${
          (state.timeline || []).slice().reverse().map(t=>`
          <div class="listItem dashboardLink" onclick="openTimelineDetail('${t.id}')">
            <div>
              <b>${t.tipo}</b>
              <div class="muted">${t.fecha} · ${t.texto}</div>

            <span class="muted">›</span>
          </div>
          `).join("") || `<div class="empty">Sin actividad reciente.</div>`
        }
      </div>
    `);
  }
}

function guardarAsistencia(){
  const grupoId = window.selectedGrupo;
  const grupo = by("grupos",grupoId);
  const fecha = document.getElementById("fechaAsistencia").value;
  const alumnos = filteredAlumnos().filter(a=>a.grupoId === grupoId);

  if(!grupo){
    toast("Selecciona un grupo válido.",true);
    return;
  }

  alumnos.forEach(a=>{
    const estado = tempAttendance[a.id] || "Presente";

    state.asistencias.push({
      id:uid("as"),
      alumnoId:a.id,
      grupoId,
      docenteId:grupo.docenteId,
      fecha,
      estado
    });

    state.timeline.push({
      id:uid("t"),
      alumnoId:a.id,
      fecha,
      tipo:"Asistencia",
      texto:`${estado} registrado en ${grupo.nombre}.`
    });
  });

  save();
  toast("Asistencia guardada");
  asistencia();
}

  setTitle("Cobranza","Cartera vencida y próximos vencimientos");

  const vencidos  = (state.pagos||[]).filter(p=>p.estado==="Vencido").sort((a,b)=>new Date(a.fecha||0)-new Date(b.fecha||0));
  const porVencer = (state.pagos||[]).filter(p=>p.estado==="Por vencer").sort((a,b)=>new Date(a.fecha||0)-new Date(b.fecha||0));

  document.getElementById("view").innerHTML = `
  <div class="kpis" style="margin-bottom:20px">
    <div class="card">
      <div class="kpiLabel">Cartera vencida</div>
      <div class="kpiValue" style="color:var(--red)">${money(vencidos.reduce((s,p)=>s+p.monto,0))}</div>

    </div>
    <div class="card">

    </div>
    <div class="card">
      <div class="kpiLabel">Total en riesgo</div>
      <div class="kpiValue">${money(vencidos.reduce((s,p)=>s+p.monto,0)+porVencer.reduce((s,p)=>s+p.monto,0))}</div>
      <div class="kpiSub">Cobranza activa</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="head">
      <h2>Pagos vencidos</h2>
      <span class="badge bad">${vencidos.length} casos</span>
    </div>
    <div class="list">
      ${
        vencidos.map(p=>{
          const a = by("alumnos",p.alumnoId);
          const dias = p.fecha ? Math.floor((hoy - new Date(p.fecha))/(1000*60*60*24)) : 0;
          const waMsg = encodeURIComponent(`Hola ${a?.nombre||""}, te recordamos que tienes un pago vencido de ${p.concepto} por ${money(p.monto)}. Por favor contáctanos para regularizar tu situación. Gracias.`);
          return `
          <div class="listItem">
            <div style="flex:1">
              <b>${a?.nombre||"-"}</b>
              <div class="muted">${p.concepto} · Venció: ${p.fecha||"-"} <span style="color:var(--red);font-weight:700">(${dias} día${dias!==1?"s":""} vencido)</span></div>
              ${a?.whatsapp ? `<a href="https://wa.me/52${a.whatsapp}?text=${waMsg}" target="_blank" class="btn success sm" style="margin-top:6px;display:inline-flex">WhatsApp</a>` : ""}
            </div>
            <div style="text-align:right">
              <b style="color:var(--red);font-size:16px">${money(p.monto)}</b><br>

            </div>
          </div>`;
        }).join("") || `<div class="empty">Sin cartera vencida. ✓</div>`
      }
    </div>
  </div>

  <div class="card">
    <div class="head">
      <h2>Próximos vencimientos</h2>
      <span class="badge warn">${porVencer.length} pendientes</span>
    </div>
    <div class="list">

function nomina(){
  setTitle("Nómina","Docentes, ventas y tabuladores");

  const tab = window._nominaTab || "docentes";
  window._nominaTab = tab;

  const tabs = `
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    <button class="btn ${tab==="docentes"?"orange":"secondary"}" onclick="window._nominaTab='docentes';nomina()">Nómina docentes</button>
    <button class="btn ${tab==="ventas"?"orange":"secondary"}" onclick="window._nominaTab='ventas';nomina()">Nómina ventas</button>
    <button class="btn ${tab==="tabuladores"?"orange":"secondary"}" onclick="window._nominaTab='tabuladores';nomina()">Tabuladores</button>
  </div>`;

  if(tab === "docentes"){
    if(!window._nominaOv) window._nominaOv = {};
    const tabuladores = state.tabuladores || [];

    function calcDetalle(d){
      const misGrupos = (state.grupos||[]).filter(g=>g.docenteId===d.id && g.estado==="Activo");
      let totalMensual = 0;
      const detalle = misGrupos.map(g=>{
        const ov = window._nominaOv[g.id] || {};
        const numAlumnosAuto = (state.alumnos||[]).filter(a=>a.grupoId===g.id && a.estado==="Activo").length;
        const numAlumnos = ov.numAlumnos !== undefined ? Number(ov.numAlumnos) : numAlumnosAuto;
        const horasSemAuto = Number(g.horasSemana)||2;
        const horasSemana = ov.horasSemana !== undefined ? Number(ov.horasSemana) : horasSemAuto;
        const tab2 = tabuladores.find(t=>numAlumnos>=t.minAlumnos && numAlumnos<=t.maxAlumnos);
        const tarifa = tab2?.tarifaHora || Number(d.tarifaHora) || 250;
        const subtotal = tarifa * horasSemana * 4;
        totalMensual += subtotal;
        const modificado = ov.numAlumnos !== undefined || ov.horasSemana !== undefined;
        return {g,numAlumnos,numAlumnosAuto,horasSemana,horasSemAuto,tarifa,subtotal,modificado};
      });
      return {d,misGrupos,totalMensual,detalle};
    }

    const rows = (state.docentes||[]).map(calcDetalle);
    const hayOverrides = Object.keys(window._nominaOv).length > 0;

    document.getElementById("view").innerHTML = `${tabs}
    <div class="card">
      <div class="head">
        <h2>Nómina docentes — ${new Date().toLocaleString("es-MX",{month:"long",year:"numeric"})}</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${hayOverrides ? `<button class="btn secondary sm" onclick="window._nominaOv={};nomina()">Restaurar automático</button>` : ""}
          <button class="btn secondary sm" onclick="window.print()">Imprimir</button>
        </div>
      </div>
      <p class="muted" style="margin-bottom:12px">Los campos de Alumnos y Hrs/sem son editables para ajustes manuales. El cálculo se actualiza al modificarlos.</p>
      ${rows.map(r=>`
        <div style="border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px${r.detalle.some(d=>d.modificado)?' background:#FFFBEB;':''}">
          <div class="head" style="margin-bottom:8px">
            <div>
              <b style="font-size:16px">${esc(r.d.nombre)}</b>
              <div class="muted">${r.misGrupos.length} grupo(s) activo(s) · Tarifa individual: ${money(r.d.tarifaHora)}/hr</div>
            </div>
            <b style="font-size:22px;color:var(--blue)">${money(r.totalMensual)}</b>
          </div>
          ${r.detalle.length ? `
            <div class="tableWrap">
              <table>
                <thead><tr><th>Grupo</th><th>Alumnos</th><th>Hrs/sem</th><th>Tarifa/hr</th><th>Mensual (×4 sem)</th><th></th></tr></thead>
                <tbody>
                  ${r.detalle.map(det=>`
                    <tr${det.modificado?' style="background:#FEF9C3"':''}>
                      <td>${esc(det.g.nombre)}</td>
                      <td>
                        <input type="number" min="0" style="width:64px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;font-size:13px${det.modificado?';border-color:var(--yellow);font-weight:700':''}"
                          value="${det.numAlumnos}" title="Auto: ${det.numAlumnosAuto}"
                          oninput="(window._nominaOv['${det.g.id}']||(window._nominaOv['${det.g.id}']={}))[&#39;numAlumnos&#39;]=this.value;nomina()">
                      </td>
                      <td>
                        <input type="number" min="0" style="width:64px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;font-size:13px${det.modificado?';border-color:var(--yellow);font-weight:700':''}"
                          value="${det.horasSemana}" title="Auto: ${det.horasSemAuto}"
                          oninput="(window._nominaOv['${det.g.id}']||(window._nominaOv['${det.g.id}']={}))[&#39;horasSemana&#39;]=this.value;nomina()">
                      </td>
                      <td>${money(det.tarifa)}</td>
                      <td><b>${money(det.subtotal)}</b></td>
                      <td>${det.modificado?`<button class="btn secondary sm" style="font-size:11px" onclick="delete window._nominaOv['${det.g.id}'];nomina()">↺</button>`:'<span class="muted" style="font-size:11px">Auto</span>'}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>` : `<div class="empty">Sin grupos activos este período.</div>`}
        </div>
      `).join("") || `<div class="empty">Sin docentes registrados.</div>`}
    </div>`;

  } else if(tab === "ventas"){
    const com = state.comisiones || {pctInscripcion:10,pctColegiatura:5};
    const mesActual = new Date().toISOString().slice(0,7);
    const pagosDelMes = (state.pagos||[]).filter(p=>p.fecha&&p.fecha.startsWith(mesActual)&&p.estado==="Pagado");

    const rows = (state.promotores||[]).map(p=>{
      const misAlumnos = (state.alumnos||[]).filter(a=>a.promotorId===p.id);
      const misIds = new Set(misAlumnos.map(a=>a.id));
      const misPagos = pagosDelMes.filter(pg=>misIds.has(pg.alumnoId));
      const insc = misPagos.filter(pg=>(pg.concepto||"").toLowerCase().includes("inscripci")).reduce((s,pg)=>s+pg.monto,0);
      const col  = misPagos.filter(pg=>!(pg.concepto||"").toLowerCase().includes("inscripci")).reduce((s,pg)=>s+pg.monto,0);
      const comision = (insc*(com.pctInscripcion/100)) + (col*(com.pctColegiatura/100));
      return {p,total:misAlumnos.length,insc,col,comision};
    });

    document.getElementById("view").innerHTML = `${tabs}
    <div class="card" style="margin-bottom:16px">
      <div class="head">
        <h2>Comisiones configuradas</h2>
        <button class="btn secondary sm" onclick="editComisiones()">Editar</button>
      </div>
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div><b>Inscripción:</b> ${com.pctInscripcion}%</div>
        <div><b>Colegiatura:</b> ${com.pctColegiatura}%</div>
        <div class="muted">Período: ${mesActual}</div>
      </div>
    </div>
    <div class="card">
      <div class="head"><h2>Nómina equipo de ventas</h2></div>
      <div class="tableWrap">
        <table>
          <thead><tr><th>Promotor</th><th>Alumnos</th><th>Inscripciones cobradas</th><th>Colegiaturas cobradas</th><th>Comisión total</th></tr></thead>
          <tbody>
            ${rows.map(r=>`
              <tr>
                <td><b>${r.p.nombre}</b></td>
                <td>${r.total}</td>
                <td>${money(r.insc)}</td>
                <td>${money(r.col)}</td>
                <td><b style="color:var(--green)">${money(r.comision)}</b></td>
              </tr>
            `).join("") || `<tr><td colspan="5" style="text-align:center;color:var(--muted)">Sin promotores registrados.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;

  } else {
    const tabuladores = state.tabuladores || [];
    document.getElementById("view").innerHTML = `${tabs}
    <div class="card">
      <div class="head">
        <h2>Tabuladores salariales docentes</h2>
        <button class="btn orange" onclick="openTabuladorModal()">+ Nuevo tabulador</button>
      </div>
      <p class="muted">La tarifa aplicada a cada grupo se determina automáticamente según el número de alumnos activos en ese grupo.</p>
      <div class="tableWrap">
        <table>
          <thead><tr><th>Nivel</th><th>Mín. alumnos</th><th>Máx. alumnos</th><th>Tarifa / hr</th><th>Acciones</th></tr></thead>
          <tbody>
            ${tabuladores.map(t=>`
              <tr>
                <td><b>${t.nombre}</b></td>
                <td>${t.minAlumnos}</td>
                <td>${t.maxAlumnos>=999?"Sin límite":t.maxAlumnos}</td>
                <td><b>${money(t.tarifaHora)}</b></td>
                <td>
                  <button class="btn secondary sm" onclick="openTabuladorModal('${t.id}')">Editar</button>
                  <button class="btn danger sm" onclick="deleteTabulador('${t.id}')">Eliminar</button>
                </td>
              </tr>
            `).join("") || `<tr><td colspan="5" style="text-align:center;color:var(--muted)">Sin tabuladores — se usa la tarifa individual de cada docente.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
  }
}

function exportCSV(){
  const rows = filteredAlumnos().map(a=>[
    a.matricula,
    a.nombre,
    by("cursos",a.cursoId)?.nombre,
    by("grupos",a.grupoId)?.nombre,
    a.estado,
    a.financiero,
    asistenciaPct(a.id) + "%"
  ]);

  const csv =
    "Matricula,Nombre,Curso,Grupo,Estado,Finanzas,Asistencia\n" +
    rows.map(r=>r.map(v=>`"${v || ""}"`).join(",")).join("\n");

  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "reporte-alumnos-cliotec-v5.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function saveAlumno(){
  const nombre = val("nombre").trim();
  if(!nombre){ toast("El nombre es requerido",true); return; }

  const alumno = {
    id:uid("a"),
    matricula:"CTA-" + String((state.alumnos || []).length + 1).padStart(4,"0"),
    nombre,
    email:val("email"),
    whatsapp:val("whatsapp"),
    cursoId:val("cursoId"),
    grupoId:val("grupoId"),
    promotorId:currentRole() === "ventas" ? session.promotorId : val("promotorId"),
    estado:"Activo",
    financiero:"Al corriente",
    inscripcion:Number(val("inscripcion"))||0,
    colegiatura:Number(val("colegiatura"))||0,
    notas:val("notas")
  };

  state.alumnos.push(alumno);

  const fechaInsc = val("fechaInscripcion");
  const fechaPrimerPago = val("fechaPrimerPago");

  if(fechaInsc && alumno.inscripcion > 0){
    state.pagos.push({
      id:uid("pg"), alumnoId:alumno.id,
      concepto:"Inscripción", monto:alumno.inscripcion,
      fecha:fechaInsc, estado:"Pagado"
    });
  }

  if(fechaPrimerPago && alumno.colegiatura > 0){
    state.pagos.push({
      id:uid("pg"), alumnoId:alumno.id,
      concepto:"Colegiatura", monto:alumno.colegiatura,
      fecha:fechaPrimerPago, estado:"Por vencer"
    });
  }

  state.timeline.push({
    id:uid("t"),
    alumnoId:alumno.id,
    fecha:new Date().toISOString().slice(0,10),
    tipo:"Inscripción",
    texto:`${alumno.nombre} fue dado de alta.`
  });

  save();
  closeModal();
  toast("Alumno creado" + (fechaInsc||fechaPrimerPago ? " · Pagos programados" : ""));
  alumnos();
}

function field(label,id,type="text",value=""){
  return `
  <div class="field">
    <label>${label}</label>
    <input id="${id}" type="${type}" value="${value}">
  </div>`;
}

function selectField(label,id,items){
  return `
  <div class="field">
    <label>${label}</label>
    <select id="${id}">
      ${(items || []).map(x=>`<option value="${x.id}">${x.nombre}</option>`).join("")}
    </select>
  </div>`;
}

function val(id){
  return document.getElementById(id)?.value || "";
}

function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function closeModal(){
  document.getElementById("modalBg")?.remove();
}

function toast(msg,bad=false){
  document.querySelector(".toast")?.remove();

  const t = document.createElement("div");

  t.className = "toast";
  t.style.background = bad ? "#991B1B" : "var(--blue)";
  t.textContent = msg;

  document.body.appendChild(t);

  setTimeout(()=>t.remove(),2500);
}

function updateAlumno(id){
  const a = (state.alumnos||[]).find(x=>x.id===id);
  if(!a){ toast("Alumno no encontrado",true); return; }
  const nombre = document.getElementById("ea_nombre")?.value?.trim();
  if(!nombre){ toast("El nombre es requerido",true); return; }
  a.nombre     = nombre;
  a.email      = document.getElementById("ea_email")?.value||"";
  a.whatsapp   = document.getElementById("ea_whatsapp")?.value||"";
  a.inscripcion= Number(document.getElementById("ea_inscripcion")?.value)||a.inscripcion||0;
  a.colegiatura= Number(document.getElementById("ea_colegiatura")?.value)||a.colegiatura||0;
  a.cursoId    = document.getElementById("ea_cursoId")?.value||a.cursoId;
  a.grupoId    = document.getElementById("ea_grupoId")?.value||a.grupoId;
  a.promotorId = document.getElementById("ea_promotorId")?.value||a.promotorId;
  a.estado     = document.getElementById("ea_estado")?.value||a.estado;
  a.financiero = document.getElementById("ea_financiero")?.value||a.financiero;
  a.notas      = document.getElementById("ea_notas")?.value||"";
  state.timeline.push({id:uid("t"),alumnoId:id,fecha:new Date().toISOString().slice(0,10),tipo:"Actualización",texto:`Datos editados por ${session?.nombre||session?.usuario||"admin"}.`});

}

function finanzas(){

  const mesActual = new Date().toISOString().slice(0,7);
  const meses = [];
  const now = new Date();
  for(let i=0;i<12;i++){
    const d = new Date(now.getFullYear(),now.getMonth()-i,1);
    meses.push(d.toISOString().slice(0,7));
  }

  const selectedMes = window._finanzasMes || mesActual;

  const pagosMes  = (state.pagos||[]).filter(p=>p.fecha&&p.fecha.startsWith(selectedMes));
  const pagados   = pagosMes.filter(p=>p.estado==="Pagado");
  const vencidos  = pagosMes.filter(p=>p.estado==="Vencido");
  const porVencer = pagosMes.filter(p=>p.estado==="Por vencer");
  const totalPagado = pagados.reduce((s,p)=>s+p.monto,0);

    <select class="search" style="width:auto;min-width:180px" onchange="window._finanzasMes=this.value;finanzas()">

    <div class="card"><div class="kpiLabel">Ingresos cobrados</div><div class="kpiValue" style="color:var(--green)">${money(totalPagado)}</div><div class="kpiSub">${pagados.length} pagos</div></div>
    <div class="card"><div class="kpiLabel">Por cobrar</div><div class="kpiValue" style="color:var(--yellow)">${money(porVencer.reduce((s,p)=>s+p.monto,0))}</div><div class="kpiSub">${porVencer.length} pendientes</div></div>
    <div class="card"><div class="kpiLabel">Cartera vencida</div><div class="kpiValue" style="color:var(--red)">${money(vencidos.reduce((s,p)=>s+p.monto,0))}</div><div class="kpiSub">${vencidos.length} vencidos</div></div>
    <div class="card"><div class="kpiLabel">Proyección total</div><div class="kpiValue">${money(totalPagado+porVencer.reduce((s,p)=>s+p.monto,0)+vencidos.reduce((s,p)=>s+p.monto,0))}</div><div class="kpiSub">Esperado del período</div></div>
  </div>

  <div class="grid2" style="margin-top:20px">
    <div class="card">
      <div class="head"><h2>Ingresos por concepto</h2></div>
      ${Object.keys(porConcepto).length ? `
        <div class="tableWrap">
          <table>
            <thead><tr><th>Concepto</th><th>Monto</th><th>% del total</th></tr></thead>
            <tbody>
              ${Object.entries(porConcepto).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
                <tr>
                  <td>${k}</td>
                  <td><b>${money(v)}</b></td>
                  <td>${totalPagado?Math.round(v/totalPagado*100):0}%</td>

        <div class="tableWrap">
          <table>
            <thead><tr><th>Promotor</th><th>Ingresos</th><th>%</th></tr></thead>
            <tbody>
              ${Object.entries(porPromotor).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
                <tr>

// ─── Calendario ─────────────────────────────────────────────────────────────
function calendario(){
  setTitle("Calendario","Pagos y eventos del mes");

  const hoy = new Date();
  const mesBase = window._calMes !== undefined ? window._calMes : hoy.getMonth();
  const anoBase = window._calAno !== undefined ? window._calAno : hoy.getFullYear();
  window._calMes = mesBase;
  window._calAno = anoBase;

  const primerDia   = new Date(anoBase,mesBase,1);
  const diasEnMes   = new Date(anoBase,mesBase+1,0).getDate();
  const inicioSem   = primerDia.getDay();
  const mesStr      = String(mesBase+1).padStart(2,"0");
  const prefijo     = `${anoBase}-${mesStr}`;
  const pagosMes    = (state.pagos||[]).filter(p=>p.fecha&&p.fecha.startsWith(prefijo));
  const mesesNombres= ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  const eventos = {};
  pagosMes.forEach(p=>{
    const d = parseInt(p.fecha.split("-")[2]);
    if(!eventos[d]) eventos[d]=[];
    eventos[d].push({texto:by("alumnos",p.alumnoId)?.nombre||"-",estado:p.estado,monto:p.monto});
  });

  let celdas = "";
  for(let i=0;i<inicioSem;i++) celdas+=`<div style="min-height:76px;border:1px solid var(--line);border-radius:8px;background:#F8FAFC"></div>`;

  for(let d=1;d<=diasEnMes;d++){
    const isHoy = d===hoy.getDate()&&mesBase===hoy.getMonth()&&anoBase===hoy.getFullYear();
    const evs   = eventos[d]||[];
    const dot   = evs.some(e=>e.estado==="Vencido")?"var(--red)":evs.some(e=>e.estado==="Por vencer")?"var(--yellow)":evs.length?"var(--green)":"transparent";
    celdas += `
    <div style="min-height:76px;border:1px solid ${isHoy?"var(--blue)":"var(--line)"};border-radius:8px;padding:6px;background:${isHoy?"#EAF2FF":"white"};cursor:${evs.length?"pointer":"default"}"
      onclick="${evs.length?`openCalDia(${d},${mesBase},${anoBase})`:""}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:${isHoy?"900":"600"};font-size:13px;color:${isHoy?"var(--blue)":"inherit"}">${d}</span>
        ${evs.length?`<span style="width:8px;height:8px;border-radius:50%;background:${dot};display:inline-block"></span>`:""}
      </div>
      ${evs.slice(0,2).map(e=>`<div style="font-size:10px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px">${e.texto}</div>`).join("")}
      ${evs.length>2?`<div style="font-size:10px;color:var(--blue)">+${evs.length-2} más</div>`:""}
    </div>`;
  }

  document.getElementById("view").innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn secondary sm" onclick="window._calMes=${mesBase===0?11:(mesBase-1)};window._calAno=${mesBase===0?(anoBase-1):anoBase};calendario()">‹ Anterior</button>
      <h2 style="margin:0">${mesesNombres[mesBase]} ${anoBase}</h2>
      <button class="btn secondary sm" onclick="window._calMes=${mesBase===11?0:(mesBase+1)};window._calAno=${mesBase===11?(anoBase+1):anoBase};calendario()">Siguiente ›</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;font-size:12px;flex-wrap:wrap">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>Pagado
      <span style="width:8px;height:8px;border-radius:50%;background:var(--yellow);display:inline-block;margin-left:6px"></span>Por vencer
      <span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-left:6px"></span>Vencido
    </div>
  </div>
  <div class="card">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">
      ${["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].map(d=>`<div style="text-align:center;font-size:11px;font-weight:900;color:var(--muted);padding:4px">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${celdas}</div>
  </div>`;
}

function openCalDia(d,mes,ano){
  const fecha = `${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const evs   = (state.pagos||[]).filter(p=>p.fecha===fecha);
  if(!evs.length) return;
  openModal(`Eventos del ${d}/${mes+1}/${ano}`,`
    <div class="list">
      ${evs.map(p=>{
        const a=by("alumnos",p.alumnoId);
        return `<div class="listItem">
          <div><b>${a?.nombre||"-"}</b><div class="muted">${p.concepto}</div></div>
          <div style="text-align:right"><b>${money(p.monto)}</b><br>${badge(p.estado)}</div>
        </div>`;
      }).join("")}
    </div>
  `);
}

window.render = render;
window.renderView = renderView;
window.toast = toast;

render();

<script type="module" id="cliotec-firebase-v5-adapter">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  doc,
  setDoc,
  deleteDoc,
  getDocs,
  onSnapshot,
  writeBatch,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CLIOTEC_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBw5dSCh1OSk7PNnhFkbLGDKPNcXj51X-8",
  authDomain: "cliotec-admin-test.firebaseapp.com",
  projectId: "cliotec-admin-test",
  storageBucket: "cliotec-admin-test.firebasestorage.app",
  messagingSenderId: "181571532651",
  appId: "1:181571532651:web:efa62fdbebc37a25ec7e2e"
};

const COLLECTION_MAP = {
  users:"usuarios",
  promotores:"promotores",
  docentes:"docentes",
  cursos:"cursos",
  grupos:"grupos",
  alumnos:"alumnos",
  prospectos:"prospectos",
  pagos:"pagos",
  asistencias:"asistencias",
  timeline:"timeline",
  tabuladores:"tabuladores"
};

const ALL_FIREBASE_COLLECTIONS = [
  ...Object.values(COLLECTION_MAP),
  "config",
  "sync_logs"
];

window.__cliotecRealtimeUnsubs = window.__cliotecRealtimeUnsubs || [];
window.__cliotecFirebaseStarted = false;
window.__cliotecApplyingRemote = false;

let publishTimer = null;

function getLocalState(){
  try{
    if(window.state){
      return window.state;
    }

    const raw = localStorage.getItem(window.APP_KEY || "cliotec_erp_v5_firebase");

    if(raw){
      return JSON.parse(raw);
    }

    return {};
  }catch(error){
    console.error("No se pudo leer el estado local:", error);
    return {};
  }
}

function saveLocalState(nextState){
  try{
    if(typeof window.applyRemoteState === "function"){
      window.applyRemoteState(nextState);
      return;
    }

    window.state = nextState;

    localStorage.setItem(
      window.APP_KEY || "cliotec_erp_v5_firebase",
      JSON.stringify(nextState)
    );

    if(typeof window.renderView === "function" && window.session){
      window.renderView();
    }
  }catch(error){
    console.error("No se pudo guardar estado local:", error);
  }
}

function setCloudBadge(text, mode = "cloud"){
  const badge =
    document.getElementById("cloudBadge") ||
    document.querySelector(".sys-bdg");

  if(badge){
    badge.innerHTML = `<i></i><span>${text}</span>`;

    badge.classList.remove(
      "cloud-ok",
      "cloud-error",
      "cloud-syncing"
    );

    badge.classList.add(
      mode === "error"
        ? "cloud-error"
        : mode === "syncing"
        ? "cloud-syncing"
        : "cloud-ok"
    );
  }
}

function normalizeDoc(firebaseDoc){
  const data = firebaseDoc.data();

  return {
    id:data.id ?? firebaseDoc.id,
    ...data
  };
}

function normalizeRemoteRows(stateKey, rows){
  if(stateKey === "users" && typeof window.normalizeUser === "function"){
    return rows.map(window.normalizeUser);
  }

  return rows;
}

function stopRealtime(){
  (window.__cliotecRealtimeUnsubs || []).forEach(unsubscribe=>{
    try{
      unsubscribe();
    }catch(error){
      console.warn("No se pudo detener listener:", error);
    }
  });

  window.__cliotecRealtimeUnsubs = [];
  window.__cliotecFirebaseStarted = false;
}

function startRealtime(){
  const db = window._cliotecDb;

  if(!db){
    console.warn("Firebase todavía no está inicializado.");
    return;
  }

  if(window.__cliotecFirebaseStarted){
    return;
  }

  window.__cliotecFirebaseStarted = true;

  setCloudBadge("Firebase realtime","cloud");

  Object.entries(COLLECTION_MAP).forEach(([stateKey,collectionName])=>{
    const unsubscribe = onSnapshot(
      collection(db,collectionName),
      snapshot=>{
        if(window.__cliotecApplyingRemote){
          return;
        }

        if(snapshot.empty){
          return;
        }

        const currentState = getLocalState();
        const remoteRows = normalizeRemoteRows(
          stateKey,
          snapshot.docs.map(normalizeDoc)
        );

        const nextState = {
          ...currentState,
          [stateKey]:remoteRows
        };

        window.__cliotecApplyingRemote = true;
        saveLocalState(nextState);
        window.__cliotecApplyingRemote = false;
      },
      error=>{
        console.error(`Error escuchando ${collectionName}:`, error);
        setCloudBadge("Error Firebase","error");

        if(typeof window.toast === "function"){
          window.toast("Error de sincronización Firebase.",true);
        }
      }
    );

    window.__cliotecRealtimeUnsubs.push(unsubscribe);
  });

  // Escuchar comisiones (doc único en colección "config")
  const unsubComisiones = onSnapshot(
    doc(db,"config","comisiones"),
    snap=>{
      if(window.__cliotecApplyingRemote || !snap.exists()) return;
      const data = snap.data();
      const currentState = getLocalState();
      const nextState = {
        ...currentState,
        comisiones:{
          pctInscripcion: Number(data.pctInscripcion) || 10,
          pctColegiatura: Number(data.pctColegiatura) || 5
        }
      };
      window.__cliotecApplyingRemote = true;
      saveLocalState(nextState);
      window.__cliotecApplyingRemote = false;
    },
    error=>{ console.warn("Error escuchando config/comisiones:", error); }
  );
  window.__cliotecRealtimeUnsubs.push(unsubComisiones);
}

async function uploadCurrentStateToFirebase(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  const currentState = getLocalState();

  setCloudBadge("Subiendo Firebase","syncing");

  stopRealtime();

  let total = 0;

  for(const [stateKey,collectionName] of Object.entries(COLLECTION_MAP)){
    const rows = Array.isArray(currentState[stateKey])
      ? currentState[stateKey]
      : [];

    if(!rows.length){
      continue;
    }

    const batch = writeBatch(db);

    rows.forEach((row,index)=>{
      const safeId = String(
        row.id ||
        row.usuario ||
        row.matricula ||
        `${stateKey}_${index}_${Date.now()}`
      );

      batch.set(doc(db,collectionName,safeId),{
        ...row,
        id:row.id || safeId,
        updatedAt:serverTimestamp()
      },{merge:true});

      total++;
    });

    await batch.commit();
  }

  // Sync comisiones como documento único en config/comisiones
  const com = currentState.comisiones || {pctInscripcion:10,pctColegiatura:5};
  await setDoc(doc(db,"config","comisiones"),{
    ...com,
    id:"comisiones",
    updatedAt:serverTimestamp()
  },{merge:true});
  total++;

  await setDoc(doc(db,"sync_logs","last_manual_upload"),{
    tipo:"manual_upload",
    total,
    fecha:new Date().toISOString(),
    updatedAt:serverTimestamp()
  },{merge:true});

  setCloudBadge("Firebase realtime","cloud");

  if(typeof window.toast === "function"){
    window.toast(`Base subida a Firebase: ${total} registros.`);
  }

  startRealtime();

  return total;
}

function publishDebounced(){
  clearTimeout(publishTimer);

  publishTimer = setTimeout(()=>{
    uploadCurrentStateToFirebase().catch(error=>{
      console.warn("No se autopublicó en Firebase:", error.message);
    });
  },1400);
}

async function clearCollection(db,collectionName){
  let total = 0;

  while(true){
    const snapshot = await getDocs(collection(db,collectionName));

    if(snapshot.empty){
      break;
    }

    const docs = snapshot.docs.slice(0,400);
    const batch = writeBatch(db);

    docs.forEach(item=>{
      batch.delete(doc(db,collectionName,item.id));
    });

    await batch.commit();

    total += docs.length;

    if(snapshot.size <= 400){
      break;
    }
  }

  return total;
}

async function clearFirebaseDatabase(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  const username = String(window.session?.usuario || "").toLowerCase();

  if(username !== "austudio"){
    alert("Solo austudio puede limpiar Firebase.");
    return 0;
  }

  const code = prompt(
    "Esta acción eliminará la base Firestore de prueba. Escribe LIMPIAR para confirmar:"
  );

  if(code !== "LIMPIAR"){
    return 0;
  }

  setCloudBadge("Limpiando Firebase","syncing");

  stopRealtime();

  let total = 0;

  for(const collectionName of ALL_FIREBASE_COLLECTIONS){
    total += await clearCollection(db,collectionName);
  }

  setCloudBadge("Firebase vacío","cloud");

  if(typeof window.toast === "function"){
    window.toast(`Firebase limpiado: ${total} documentos eliminados.`);
  }

  startRealtime();

  return total;
}

async function testConnection(){
  const db = window._cliotecDb;

  if(!db){
    throw new Error("Firebase no está listo.");
  }

  await setDoc(doc(db,"sync_logs","test_connection"),{
    ok:true,
    source:"cliotec_erp_v5_adapter",
    fecha:new Date().toISOString(),
    updatedAt:serverTimestamp()
  },{merge:true});

  if(typeof window.toast === "function"){
    window.toast("Conexión Firebase correcta.");
  }

  return true;
}

async function initAutoFirebase(){
  try{
    setCloudBadge("Conectando Firebase","syncing");

    const app = getApps().length
      ? getApp()
      : initializeApp(CLIOTEC_FIREBASE_CONFIG);

    const db = getFirestore(app);

    window._cliotecApp = app;
    window._cliotecDb = db;
    window._fbReady = true;

    window.CliotecFirebase = {
      getApp:()=>app,
      getDb:()=>db,
      isReady:()=>true,
      startRealtime,
      stopRealtime,
      uploadCurrentStateToFirebase,
      clearFirebaseDatabase,
      testConnection,
      publishDebounced,
      setDoc,
      deleteDoc,
      doc,
      collection,
      onSnapshot,
      writeBatch,
      serverTimestamp
    };

    setCloudBadge("Firebase conectado","cloud");

    if(window.session){
      startRealtime();
    }

    console.log("Cliotec ERP V5 conectado a Firebase.");

  }catch(error){
    console.error("Error inicializando Firebase:", error);

    setCloudBadge("Firebase no conectado","error");

    if(typeof window.toast === "function"){
      window.toast("No se pudo conectar Firebase.",true);
    }
  }
}

window.initAutoFirebase = initAutoFirebase;
window.startRealtime = startRealtime;
window.stopRealtime = stopRealtime;
window.uploadCurrentStateToFirebase = uploadCurrentStateToFirebase;
window.clearFirebaseDatabase = clearFirebaseDatabase;

initAutoFirebase();
</script>
